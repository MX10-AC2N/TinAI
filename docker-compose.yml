# ══════════════════════════════════════════════════════════════════
#  TinAI v3 – docker-compose.yml
#  Un seul conteneur : llama.cpp + Open WebUI + OpenFang
#  Multi-modèle : configure LLAMA_HF_* dans .env
# ══════════════════════════════════════════════════════════════════

services:

  # ── Service principal ─────────────────────────────────────────
  tinai:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${TINAI_IMAGE:-tinai:v3}

    container_name: tinai
    restart: unless-stopped

    ports:
      - "${PORT_WEBUI:-3000}:3000"     # Open WebUI  → http://localhost:3000
      - "${PORT_OPENFANG:-4200}:4200"  # OpenFang    → http://localhost:4200
      - "${PORT_LLAMA:-8081}:8081"     # llama-server API (OpenAI-compatible)

    volumes:
      - ${MODELS_DIR:-./models}:/data/models              # Modèles GGUF
      - ${WEBUI_DATA_DIR:-./data/webui}:/data/webui       # BDD WebUI
      - ${OPENFANG_DATA_DIR:-./data/openfang}:/data/openfang  # Agents & config
      - tinai-logs:/var/log/tinai                         # Logs partagés avec monitor

    environment:
      # ── Modèle (multi-modèle via .env) ──────────────────────
      LLAMA_HF_REPO:    ${LLAMA_HF_REPO:-Qwen/Qwen3-1.7B-GGUF}
      LLAMA_HF_FILE:    ${LLAMA_HF_FILE:-qwen3-1.7b-q5_k_m.gguf}
      LLAMA_MODEL_PATH: /data/models/${LLAMA_HF_FILE:-qwen3-1.7b-q5_k_m.gguf}

      # ── Paramètres llama.cpp ─────────────────────────────────
      LLAMA_CTX_SIZE:   ${LLAMA_CTX_SIZE:-8192}
      LLAMA_THREADS:    ${LLAMA_THREADS:-4}
      LLAMA_GPU_LAYERS: ${LLAMA_GPU_LAYERS:-0}
      LLAMA_PORT:       8081

      # ── Ports internes ───────────────────────────────────────
      WEBUI_PORT:       3000
      OPENFANG_PORT:    4200

      # ── Sécurité ─────────────────────────────────────────────
      TINAI_API_KEY:    ${TINAI_API_KEY:-sk-tinai}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-tinai-secret-change-me}

      # ── OpenFang canaux (optionnel) ──────────────────────────
      TELEGRAM_BOT_TOKEN:  ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN:   ${DISCORD_BOT_TOKEN:-}
      SLACK_BOT_TOKEN:     ${SLACK_BOT_TOKEN:-}

    mem_limit: ${MEM_LIMIT:-6g}
    mem_reservation: 2g

    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - tinai-net

  # ── Monitoring léger (sidecar) ───────────────────────────────
  # Expose les métriques système basiques via un endpoint HTTP simple.
  # Accessible sur http://localhost:9090/metrics (format texte).
  # Pour désactiver : commente ce bloc ou ajoute MONITORING=false dans .env.
  monitor:
    image: alpine:3.20
    container_name: tinai-monitor
    restart: unless-stopped
    profiles:
      - monitoring   # Activer avec : docker compose --profile monitoring up

    volumes:
      - tinai-logs:/var/log/tinai:ro   # Accès lecture seule aux logs

    # Serveur HTTP minimaliste qui expose les stats du conteneur tinai
    command: >
      sh -c "
        apk add --no-cache curl procps &&
        while true; do
          TIMESTAMP=\$$(date -u +%s)
          LOGSIZE_LLAMA=\$$(stat -c%s /var/log/tinai/llama.log 2>/dev/null || echo 0)
          LOGSIZE_WEBUI=\$$(stat -c%s /var/log/tinai/webui.log 2>/dev/null || echo 0)
          LOGSIZE_FANG=\$$(stat -c%s /var/log/tinai/openfang.log 2>/dev/null || echo 0)
          printf 'tinai_log_bytes{service=\"llama\"} %s %s\n' \"\$$LOGSIZE_LLAMA\" \"\$$TIMESTAMP\"
          printf 'tinai_log_bytes{service=\"webui\"} %s %s\n' \"\$$LOGSIZE_WEBUI\" \"\$$TIMESTAMP\"
          printf 'tinai_log_bytes{service=\"openfang\"} %s %s\n' \"\$$LOGSIZE_FANG\" \"\$$TIMESTAMP\"
          sleep 30
        done | nc -l -p 9090 -k
      "

    ports:
      - "${PORT_MONITOR:-9090}:9090"

    networks:
      - tinai-net

    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

# ── Volumes nommés ───────────────────────────────────────────────
volumes:
  tinai-logs:

# ── Réseau ───────────────────────────────────────────────────────
networks:
  tinai-net:
    driver: bridge
