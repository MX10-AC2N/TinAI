# ══════════════════════════════════════════════════════════════════
#  TinAI v7 – docker-compose.yml (tous les services optionnels)
# ══════════════════════════════════════════════════════════════════

services:

  # ── llama.cpp (optionnel – profil "llama")
  llama:
    profiles: ["llama"]                    # ← NOUVEAU
    image: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    container_name: tinai-llama
    restart: unless-stopped

    ports:
      - "${PORT_LLAMA:-8081}:8080"

    volumes:
      - ${MODELS_DIR:-./models}:/models
      - ./scripts/llama-entrypoint.sh:/llama-entrypoint.sh

    entrypoint: ["sh", "/llama-entrypoint.sh"]

    environment:
      LLAMA_HF_REPO:          ${LLAMA_HF_REPO:-Qwen/Qwen3-1.7B-GGUF}
      LLAMA_HF_FILE:          ${LLAMA_HF_FILE:-Qwen3-1.7B-Q5_K_M.gguf}
      LLAMA_ARG_MODEL:        /models/${LLAMA_HF_FILE}
      LLAMA_ARG_HOST:         0.0.0.0
      LLAMA_ARG_PORT:         8080
      LLAMA_ARG_CTX_SIZE:     ${LLAMA_CTX_SIZE:-8192}
      LLAMA_ARG_N_PARALLEL:   ${LLAMA_N_PARALLEL:-1}
      LLAMA_ARG_THREADS:      ${LLAMA_THREADS:-4}
      LLAMA_ARG_N_GPU_LAYERS: ${LLAMA_GPU_LAYERS:-0}
      LLAMA_ARG_API_KEY:      ${TINAI_API_KEY:-sk-tinai}
      LLAMA_ARG_ALIAS:        ${LLAMA_MODEL_ALIAS:-qwen3-1.7b}

    mem_limit: ${MEM_LIMIT:-6g}
    mem_reservation: 2g

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

    networks:
      - tinai-net

  # ── OpenFang (optionnel – profil "openfang")
  tinai:
    profiles: ["openfang"]                 # ← NOUVEAU
    build:
      context: .
      dockerfile: Dockerfile
    image: ${TINAI_IMAGE:-tinai:v7}

    container_name: tinai
    restart: unless-stopped

    # depends_on supprimé → OpenFang peut tourner sans llama (utilise des LLM externes)
    ports:
      - "${PORT_OPENFANG:-4200}:4200"

    volumes:
      - ${OPENFANG_DATA_DIR:-./data/openfang}:/root/.openfang

    environment:
      LLAMA_PORT:          8081
      LLAMA_HOST:          llama
      OPENFANG_PORT:       4200
      TINAI_API_KEY:       ${TINAI_API_KEY:-sk-tinai}
      # Providers externes (fonctionnent même sans llama)
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:      ${OPENAI_API_KEY:-}
      GROQ_API_KEY:        ${GROQ_API_KEY:-}

    mem_limit: 1g
    mem_reservation: 256m

    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 25s
      retries: 3

    networks:
      - tinai-net

  # ── Open WebUI (optionnel)
  webui:
    profiles: ["webui"]
    image: ${WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main-slim}
    container_name: tinai-webui
    restart: unless-stopped

    depends_on:
      llama:
        condition: service_healthy   # ne s’applique que si le profil llama est activé

    ports:
      - "${PORT_WEBUI:-3000}:8080"

    volumes:
      - ${WEBUI_DATA_DIR:-./data/webui}:/app/backend/data

    environment:
      OPENAI_API_BASE_URL: http://llama:8080/v1
      OPENAI_API_KEY:      ${TINAI_API_KEY:-sk-tinai}
      WEBUI_SECRET_KEY:    ${WEBUI_SECRET_KEY:-tinai-secret-change-me}
      WEBUI_AUTH:          ${WEBUI_AUTH:-False}

    networks:
      - tinai-net

  # ── Monitoring (optionnel)
  monitor:
    profiles: ["monitoring"]
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    image: tinai-monitor:latest
    container_name: tinai-monitor
    restart: unless-stopped

    ports:
      - "9000:19999"   # Netdata

    networks:
      - tinai-net

networks:
  tinai-net:
    driver: bridge