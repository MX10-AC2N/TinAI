name: 🔒 Audit Sécurité

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    name: Audit complet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. ShellCheck sur tous les scripts ────────────────────────
      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          FAIL=false
          for script in install.sh install-arm64.sh; do
            [ -f "$script" ] || continue
            echo "── $script ──"
            shellcheck --severity=error --exclude=SC2034,SC2154 "$script" \
              && echo "✅ $script OK" \
              || { echo "❌ $script a des erreurs ShellCheck"; FAIL=true; }
          done
          $FAIL && exit 1 || true

      # ── 2. Secrets et données sensibles ──────────────────────────
      - name: Audit secrets hardcodés
        run: |
          FAIL=false
          echo "🔍 Recherche de secrets dans les fichiers sources..."
          # Patterns interdits (regex valides pour grep -P)
          declare -A CHECKS=(
            ["Clé privée SSH/TLS"]='-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY'
            ["Clé AWS"]='AKIA[0-9A-Z]{16}'
            ["Token GitHub"]='ghp_[A-Za-z0-9]{36}'
            ["Clé API hardcodée"]='(?i)(api_key|apikey|api-key)\s*[=:]\s*(?!\$\{|sk-tinai|PLACEHOLDER)[A-Za-z0-9_\-]{16,}'
            ["Mot de passe hardcodé (hors exemple)"]='(?i)password\s*[=:]\s*(?!\\( \{|changezmoi123|CHANGEME|PLACEHOLDER|#)[^ ;"'\'' \){}]{8,}'
          )

          for name in "${!CHECKS[@]}"; do
            pattern="${CHECKS[$name]}"
            
            # Recherche avec exclusions pour ignorer les faux positifs exacts
            FOUND=$(grep -rPn "$pattern" \
              --include="*.sh" --include="*.yml" --include="*.yaml" \
              --include="*.toml" --include="*.json" \
              --exclude-dir=".git" . 2>/dev/null \
              | grep -v "\.example" \
              | grep -v 'changezmoi123' \
              | grep -v 'CODE_PASSWORD="\${CODE_PASSWORD:-changezmoi123}"' \
              | grep -v "CODE_PASSWORD='\\${CODE_PASSWORD:-changezmoi123}'" \
            )

            if [ -n "$FOUND" ]; then
              echo "❌ $name"
              echo "Lignes suspectes trouvées :"
              echo "$FOUND"
              FAIL=true
            else
              echo "✅ Aucun : $name"
            fi
          done

          if $FAIL; then
            echo ""
            echo "❌ Des secrets (ou faux positifs non exclus) ont été détectés – voir ci-dessus ↑"
            exit 1
          else
            echo ""
            echo "✅ Aucun secret hardcodé détecté"
          fi

      # ── 3. Fichiers sensibles non commités ────────────────────────
      - name: Audit fichiers sensibles dans git
        run: |
          FAIL=false
          SENSITIVE=(.env .env.local .env.production "*.pem" "*.key" "*.p12" "id_rsa" "id_ed25519")
          for pattern in "${SENSITIVE[@]}"; do
            FOUND=$(git ls-files "$pattern" 2>/dev/null || true)
            if [ -n "$FOUND" ]; then
              echo "❌ Fichier sensible tracké : $FOUND"
              FAIL=true
            fi
          done
          $FAIL && exit 1 || echo "✅ Aucun fichier sensible commité"

      # ── 4. .gitignore complet ─────────────────────────────────────
      - name: Vérifie .gitignore
        run: |
          FAIL=false
          REQUIRED=(".env" "models/" "projects/" "TinAI/" "*.tar" "*.pem" "*.key" "comfyui/")
          for pattern in "${REQUIRED[@]}"; do
            if grep -qF "$pattern" .gitignore; then
              echo "✅ $pattern"
            else
              echo "❌ Manquant dans .gitignore : $pattern"
              FAIL=true
            fi
          done
          $FAIL && exit 1 || echo "✅ .gitignore complet"

      # ── 5. Images Docker – pas de :latest sur images critiques ────
      - name: Audit images Docker
        run: |
          FAIL=false
          echo "🔍 Vérification des tags d'images Docker..."

          # Images critiques qui NE doivent PAS utiliser :latest
          CRITICAL_IMAGES=(
            "ghcr.io/ggml-org/llama.cpp"
            "ghcr.io/mostlygeek/llama-swap"
            "yanwk/comfyui-boot"
          )
          for img in "${CRITICAL_IMAGES[@]}"; do
            # Dans les scripts d'install, ces images doivent avoir un tag explicite
            if grep -rn "image:.*${img}$" install.sh install-arm64.sh 2>/dev/null; then
              echo "⚠️  Image sans tag explicite : $img"
              # Warning seulement, pas de fail (les tags :server/:cpu sont déjà explicites dans le code)
            fi
          done

          # Images locales ARM64 sont autorisées sans tag de version
          echo "✅ Images Docker vérifiées"

      # ── 6. Ports exposés via variables (pas hardcodés) ────────────
      - name: Audit ports hardcodés
        run: |
          # Les ports dans les heredocs docker-compose doivent utiliser \${PORT_xxx}
          for script in install.sh install-arm64.sh; do
            [ -f "$script" ] || continue
            # Cherche des ports directs style "8081:8081" sans variable
            if grep -En '"[0-9]{4,5}:[0-9]{4,5}"' "$script" | grep -v '\$'; then
              echo "❌ Port hardcodé dans $script (utilise \${PORT_xxx})"
              exit 1
            fi
          done
          echo "✅ Ports via variables OK"

      # ── 7. Permissions des scripts ───────────────────────────────
      - name: Audit permissions
        run: |
          for script in install.sh install-arm64.sh; do
            [ -f "$script" ] || continue
            # Les scripts ne doivent pas être SUID/SGID
            PERMS=$(stat -c "%a" "$script")
            if [ "${PERMS:0:1}" = "4" ] || [ "${PERMS:0:1}" = "2" ]; then
              echo "❌ $script a des permissions dangereuses (SUID/SGID): $PERMS"
              exit 1
            fi
            echo "✅ $script permissions: $PERMS"
          done

      # ── 8. Variables d'environnement Docker non exposées ─────────
      - name: Audit variables d'environnement dans les scripts
        run: |
          FAIL=false
          echo "🔍 Vérification variables sensibles exposées en clair..."

          # PASSWORD et TINAI_API_KEY doivent toujours venir de variables shell
          # (jamais hardcodées dans les heredocs docker-compose)
          for script in install.sh install-arm64.sh; do
            [ -f "$script" ] || continue
            # Cherche PASSWORD= suivi d'une valeur en dur (pas d'une variable)
            if grep -n 'PASSWORD=[^$"'\''\\]' "$script" | grep -v '#'; then
              echo "⚠️  Possible PASSWORD hardcodé dans $script"
            fi
            echo "✅ $script – variables d'env OK"
          done

      # ── 9. Résumé ─────────────────────────────────────────────────
      - name: Résumé audit
        if: always()
        run: |
          echo ""
          echo "══════════════════════════════════════"
          echo "  🔒 Audit Sécurité TinAI – Terminé"
          echo "══════════════════════════════════════"
          echo ""
          echo "Contrôles effectués :"
          echo "  ✔ ShellCheck (erreurs critiques)"
          echo "  ✔ Secrets hardcodés (regex)"
          echo "  ✔ Fichiers sensibles dans git"
          echo "  ✔ .gitignore complet"
          echo "  ✔ Tags images Docker"
          echo "  ✔ Ports via variables"
          echo "  ✔ Permissions scripts"
          echo "  ✔ Variables d'environnement"
