name: Build & Publish – GHCR

# ══════════════════════════════════════════════════════════════════
#  Déclenché manuellement depuis l'onglet "Actions" de GitHub.
#  Build natif amd64 + arm64 en parallèle → merge manifest multi-arch
# ══════════════════════════════════════════════════════════════════
on:
  workflow_dispatch:
    inputs:

      hf_repo:
        description: "HuggingFace repo du modèle"
        required: true
        default: "Qwen/Qwen3-1.7B-GGUF"

      hf_file:
        description: "Fichier GGUF à utiliser"
        required: true
        default: "qwen3-1.7b-q5_k_m.gguf"
        type: choice
        options:
          - qwen3-1.7b-q4_k_m.gguf       # ~1.2 GB  · rapide
          - qwen3-1.7b-q5_k_m.gguf       # ~1.4 GB  · équilibré (défaut)
          - qwen3-1.7b-q8_0.gguf         # ~1.9 GB  · haute qualité
          - custom

      hf_file_custom:
        description: "Nom du fichier GGUF (si 'custom' ci-dessus)"
        required: false
        default: ""

      image_tag:
        description: "Tag Docker (ex: latest, v3.1, stable)"
        required: true
        default: "latest"

      platforms:
        description: "Architectures à builder"
        required: true
        default: "linux/amd64,linux/arm64"
        type: choice
        options:
          - linux/amd64,linux/arm64
          - linux/amd64
          - linux/arm64

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tinai

# ══════════════════════════════════════════════════════════════════
# JOB 1 – Résolution des paramètres
# ══════════════════════════════════════════════════════════════════
jobs:
  resolve:
    name: Résolution des paramètres
    runs-on: ubuntu-latest
    outputs:
      hf_repo:    ${{ steps.resolve.outputs.hf_repo }}
      hf_file:    ${{ steps.resolve.outputs.hf_file }}
      image_tag:  ${{ steps.resolve.outputs.image_tag }}
      image_full: ${{ steps.resolve.outputs.image_full }}
      image_repo: ${{ steps.resolve.outputs.image_repo }}
      do_amd64:   ${{ steps.resolve.outputs.do_amd64 }}
      do_arm64:   ${{ steps.resolve.outputs.do_arm64 }}

    steps:
      - name: Résoudre les paramètres
        id: resolve
        run: |
          HF_REPO="${{ github.event.inputs.hf_repo }}"
          HF_FILE="${{ github.event.inputs.hf_file }}"
          CUSTOM="${{ github.event.inputs.hf_file_custom }}"
          TAG="${{ github.event.inputs.image_tag }}"
          PLATFORMS="${{ github.event.inputs.platforms }}"

          if [ "${HF_FILE}" = "custom" ]; then
            [ -z "${CUSTOM}" ] && echo "❌ hf_file_custom vide" && exit 1
            HF_FILE="${CUSTOM}"
          fi
          [[ "${HF_FILE}" != *.gguf ]] && echo "❌ Pas un .gguf : ${HF_FILE}" && exit 1
          # GHCR exige du lowercase
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REPO="ghcr.io/${OWNER}/tinai"
          IMAGE_FULL="${IMAGE_REPO}:${TAG}"

          # Flags par plateforme demandée
          DO_AMD64="false"; DO_ARM64="false"
          [[ "${PLATFORMS}" == *"amd64"* ]] && DO_AMD64="true"
          [[ "${PLATFORMS}" == *"arm64"* ]] && DO_ARM64="true"

          echo "hf_repo=${HF_REPO}"         >> "$GITHUB_OUTPUT"
          echo "hf_file=${HF_FILE}"         >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}"           >> "$GITHUB_OUTPUT"
          echo "image_full=${IMAGE_FULL}"   >> "$GITHUB_OUTPUT"
          echo "image_repo=${IMAGE_REPO}"   >> "$GITHUB_OUTPUT"
          echo "do_amd64=${DO_AMD64}"       >> "$GITHUB_OUTPUT"
          echo "do_arm64=${DO_ARM64}"       >> "$GITHUB_OUTPUT"

          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║          Paramètres de build                 ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Repo HF     : ${HF_REPO}"
          echo "║  Fichier     : ${HF_FILE}"
          echo "║  Tag image   : ${TAG}"
          echo "║  Image       : ${IMAGE_FULL}"
          echo "║  Plateformes : ${PLATFORMS}"
          echo "║  amd64       : ${DO_AMD64}  |  arm64 : ${DO_ARM64}"
          echo "╚══════════════════════════════════════════════╝"

# ══════════════════════════════════════════════════════════════════
# JOB 2a – Build natif linux/amd64
# ══════════════════════════════════════════════════════════════════
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.do_amd64 == 'true'
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers – amd64
        uses: actions/cache@v4
        with:
          path: /tmp/buildx-cache-amd64
          key: buildx-publish-amd64-${{ hashFiles('Dockerfile', 'supervisord.conf', 'scripts/**') }}
          restore-keys: buildx-publish-amd64-

      - name: Build & Push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ needs.resolve.outputs.image_repo }}:${{ needs.resolve.outputs.image_tag }}-amd64
          build-args: |
            LLAMA_HF_REPO=${{ needs.resolve.outputs.hf_repo }}
            LLAMA_HF_FILE=${{ needs.resolve.outputs.hf_file }}
          cache-from: type=local,src=/tmp/buildx-cache-amd64
          cache-to:   type=local,dest=/tmp/buildx-cache-amd64-new,mode=max
          provenance: false

      - name: Rotation cache amd64
        run: |
          rm -rf /tmp/buildx-cache-amd64
          mv /tmp/buildx-cache-amd64-new /tmp/buildx-cache-amd64

# ══════════════════════════════════════════════════════════════════
# JOB 2b – Build natif linux/arm64
# ══════════════════════════════════════════════════════════════════
  build-arm64:
    name: Build arm64
    runs-on: ubuntu-24.04-arm   # runner ARM natif — pas de QEMU
    needs: resolve
    if: needs.resolve.outputs.do_arm64 == 'true'
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers – arm64
        uses: actions/cache@v4
        with:
          path: /tmp/buildx-cache-arm64
          key: buildx-publish-arm64-${{ hashFiles('Dockerfile', 'supervisord.conf', 'scripts/**') }}
          restore-keys: buildx-publish-arm64-

      - name: Build & Push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ needs.resolve.outputs.image_repo }}:${{ needs.resolve.outputs.image_tag }}-arm64
          build-args: |
            LLAMA_HF_REPO=${{ needs.resolve.outputs.hf_repo }}
            LLAMA_HF_FILE=${{ needs.resolve.outputs.hf_file }}
          cache-from: type=local,src=/tmp/buildx-cache-arm64
          cache-to:   type=local,dest=/tmp/buildx-cache-arm64-new,mode=max
          provenance: false

      - name: Rotation cache arm64
        run: |
          rm -rf /tmp/buildx-cache-arm64
          mv /tmp/buildx-cache-arm64-new /tmp/buildx-cache-arm64

# ══════════════════════════════════════════════════════════════════
# JOB 3 – Merge manifest multi-arch
# ══════════════════════════════════════════════════════════════════
  merge-manifest:
    name: Merge manifest multi-arch
    runs-on: ubuntu-latest
    needs: [resolve, build-amd64, build-arm64]
    # Tourne même si un seul des deux builds a été demandé
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.build-amd64.result == 'success' || needs.build-amd64.result == 'skipped') &&
      (needs.build-arm64.result == 'success' || needs.build-arm64.result == 'skipped')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Créer le manifest multi-arch
        run: |
          REPO="${{ needs.resolve.outputs.image_repo }}"
          TAG="${{ needs.resolve.outputs.image_tag }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          AMEND_ARGS=""
          [ "${{ needs.resolve.outputs.do_amd64 }}" = "true" ] && \
            AMEND_ARGS="${AMEND_ARGS} --amend ${REPO}:${TAG}-amd64"
          [ "${{ needs.resolve.outputs.do_arm64 }}" = "true" ] && \
            AMEND_ARGS="${AMEND_ARGS} --amend ${REPO}:${TAG}-arm64"

          # Tag principal (ex: latest)
          docker manifest create "${REPO}:${TAG}" ${AMEND_ARGS}
          docker manifest push   "${REPO}:${TAG}"

          # Tag sha court (ex: sha-a1b2c3d)
          docker manifest create "${REPO}:sha-${SHORT_SHA}" ${AMEND_ARGS}
          docker manifest push   "${REPO}:sha-${SHORT_SHA}"

          echo "✅ Manifest créé : ${REPO}:${TAG}"
          echo "✅ Manifest créé : ${REPO}:sha-${SHORT_SHA}"

      - name: Résumé du build
        run: |
          REPO="${{ needs.resolve.outputs.image_repo }}"
          TAG="${{ needs.resolve.outputs.image_tag }}"
          {
            echo "## ✅ Image publiée sur GHCR"
            echo ""
            echo "| Paramètre       | Valeur |"
            echo "|-----------------|--------|"
            echo "| **Image**       | \`${REPO}:${TAG}\` |"
            echo "| **Modèle HF**   | \`${{ needs.resolve.outputs.hf_repo }}\` |"
            echo "| **Fichier**     | \`${{ needs.resolve.outputs.hf_file }}\` |"
            echo "| **Plateformes** | \`${{ github.event.inputs.platforms }}\` |"
            echo "| **Commit**      | \`${{ github.sha }}\` |"
            echo ""
            echo "### Utilisation"
            echo "\`\`\`bash"
            echo "docker pull ${REPO}:${TAG}"
            echo ""
            echo "# Ou avec docker-compose :"
            echo "TINAI_IMAGE=${REPO}:${TAG} docker compose up -d"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
