name: Build & Publish – GHCR

# ══════════════════════════════════════════════════════════════════
#  Déclenché manuellement depuis l'onglet "Actions" de GitHub.
#  Permet de choisir le modèle llama.cpp avant le build.
# ══════════════════════════════════════════════════════════════════
on:
  workflow_dispatch:
    inputs:

      # ── Modèle ────────────────────────────────────────────────
      hf_repo:
        description: "HuggingFace repo du modèle"
        required: true
        default: "Qwen/Qwen3-1.7B-GGUF"

      hf_file:
        description: "Fichier GGUF à utiliser"
        required: true
        default: "qwen3-1.7b-q5_k_m.gguf"
        type: choice
        options:
          - qwen3-1.7b-q4_k_m.gguf       # ~1.2 GB  · rapide
          - qwen3-1.7b-q5_k_m.gguf       # ~1.4 GB  · équilibré (défaut)
          - qwen3-1.7b-q8_0.gguf         # ~1.9 GB  · haute qualité
          - custom                         # utilise hf_file_custom ci-dessous

      hf_file_custom:
        description: "Nom du fichier GGUF (si 'custom' ci-dessus)"
        required: false
        default: ""

      # ── Tag de l'image ────────────────────────────────────────
      image_tag:
        description: "Tag Docker (ex: latest, v3.1, stable)"
        required: true
        default: "latest"

      # ── Architectures ─────────────────────────────────────────
      platforms:
        description: "Architectures à builder"
        required: true
        default: "linux/amd64,linux/arm64"
        type: choice
        options:
          - linux/amd64,linux/arm64
          - linux/amd64
          - linux/arm64

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tinai

jobs:

  # ================================================================
  # JOB 1 – Résolution du modèle et validation des inputs
  # ================================================================
  resolve:
    name: Résolution des paramètres
    runs-on: ubuntu-latest
    outputs:
      hf_repo: ${{ steps.resolve.outputs.hf_repo }}
      hf_file: ${{ steps.resolve.outputs.hf_file }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      image_full: ${{ steps.resolve.outputs.image_full }}

    steps:
      - name: Résoudre les paramètres
        id: resolve
        run: |
          HF_REPO="${{ github.event.inputs.hf_repo }}"
          HF_FILE="${{ github.event.inputs.hf_file }}"
          CUSTOM="${{ github.event.inputs.hf_file_custom }}"
          TAG="${{ github.event.inputs.image_tag }}"

          # Si "custom", utiliser le champ libre
          if [ "${HF_FILE}" = "custom" ]; then
            if [ -z "${CUSTOM}" ]; then
              echo "❌ hf_file est 'custom' mais hf_file_custom est vide."
              exit 1
            fi
            HF_FILE="${CUSTOM}"
          fi

          # Validation basique : doit finir par .gguf
          if [[ "${HF_FILE}" != *.gguf ]]; then
            echo "❌ Le fichier '${HF_FILE}' ne semble pas être un .gguf valide."
            exit 1
          fi

          IMAGE_FULL="ghcr.io/${{ github.repository_owner }}/tinai:${TAG}"

          echo "hf_repo=${HF_REPO}"    >> "$GITHUB_OUTPUT"
          echo "hf_file=${HF_FILE}"    >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}"      >> "$GITHUB_OUTPUT"
          echo "image_full=${IMAGE_FULL}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║          Paramètres de build                 ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Repo HF   : ${HF_REPO}"
          echo "║  Fichier   : ${HF_FILE}"
          echo "║  Tag image : ${TAG}"
          echo "║  Image     : ${IMAGE_FULL}"
          echo "║  Plateformes : ${{ github.event.inputs.platforms }}"
          echo "╚══════════════════════════════════════════════╝"

  # ================================================================
  # JOB 2 – Build multi-arch & push sur GHCR
  # ================================================================
  build-push:
    name: Build & Push (${{ needs.resolve.outputs.hf_file }})
    runs-on: ubuntu-latest
    needs: resolve
    timeout-minutes: 120

    permissions:
      contents: read
      packages: write   # nécessaire pour pousser sur GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── QEMU pour cross-compilation arm64 ─────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authentification GHCR ─────────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Métadonnées & tags ────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.resolve.outputs.image_tag }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=TinAI
            org.opencontainers.image.description=OpenFang AI agent – llama.cpp via image officielle
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            tinai.llama.hf_repo=${{ needs.resolve.outputs.hf_repo }}
            tinai.llama.hf_file=${{ needs.resolve.outputs.hf_file }}

      # ── Cache Docker layers ───────────────────────────────────
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/buildx-cache
          key: buildx-multiarch-${{ hashFiles('Dockerfile', 'supervisord.conf', 'scripts/**') }}
          restore-keys: buildx-multiarch-

      # ── Build & Push ──────────────────────────────────────────
      - name: Build & Push vers GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LLAMA_HF_REPO=${{ needs.resolve.outputs.hf_repo }}
            LLAMA_HF_FILE=${{ needs.resolve.outputs.hf_file }}
          cache-from: type=local,src=/tmp/buildx-cache
          cache-to: type=local,dest=/tmp/buildx-cache-new,mode=max
          provenance: false

      - name: Rotation cache
        run: |
          rm -rf /tmp/buildx-cache
          mv /tmp/buildx-cache-new /tmp/buildx-cache

      # ── Résumé final ──────────────────────────────────────────
      - name: Résumé du build
        run: |
          echo "## ✅ Image publiée sur GHCR" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Paramètre     | Valeur |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image**     | \`${{ needs.resolve.outputs.image_full }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Modèle HF** | \`${{ needs.resolve.outputs.hf_repo }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Fichier**   | \`${{ needs.resolve.outputs.hf_file }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Plateformes** | \`${{ github.event.inputs.platforms }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit**    | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Utilisation" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ needs.resolve.outputs.image_full }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# Ou avec docker-compose :" >> "$GITHUB_STEP_SUMMARY"
          echo "TINAI_IMAGE=${{ needs.resolve.outputs.image_full }} docker compose up -d" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
