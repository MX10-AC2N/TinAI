name: CI – TinAI v2 Deploy & Test

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache OpenFang image
        id: cache-openfang
        uses: actions/cache@v4
        with:
          path: /tmp/openfang-image.tar
          key: openfang-image-${{ hashFiles('openfang-version.txt') }}
          restore-keys: openfang-image-

      - name: Build or restore OpenFang image
        run: |
          if [ "${{ steps.cache-openfang.outputs.cache-hit }}" = "true" ] && [ -f /tmp/openfang-image.tar ]; then
            echo "♻️  Restauration OpenFang depuis le cache..."
            docker load -i /tmp/openfang-image.tar
            echo "✅ Image restaurée"
          else
            echo "🔨 Compilation OpenFang depuis le source..."
            git clone --depth=1 https://github.com/RightNow-AI/openfang.git /tmp/openfang
            git -C /tmp/openfang rev-parse HEAD > openfang-version.txt
            docker build -t tinai-openfang:latest /tmp/openfang
            docker save tinai-openfang:latest -o /tmp/openfang-image.tar
            echo "✅ Image buildée et mise en cache"
          fi

      # Créer un .env CI depuis le .env.example (ports par défaut)
      - name: Setup .env for CI
        run: |
          cp .env.example .env
          echo "✅ .env CI initialisé depuis .env.example"

      - name: Generate docker-compose.yml
        run: |
          chmod +x install.sh
          CI=true ./install.sh
          echo "── docker-compose.yml généré ──"
          cat TinAI/docker-compose.yml

      - name: Install tinai CLI
        run: |
          chmod +x tinai
          sudo cp tinai /usr/local/bin/tinai
          sudo sed -i "s|TINAI_DIR_PLACEHOLDER|$(pwd)/TinAI|g" /usr/local/bin/tinai
          # Copier le .env là où tinai le cherche
          cp .env TinAI/.env
          echo "✅ CLI tinai installé"

      - name: Validate docker-compose syntax
        run: |
          cd TinAI
          docker compose config > /dev/null
          echo "✅ Syntaxe docker-compose valide"

      - name: Check all services defined
        run: |
          cd TinAI
          ALL_OK=true
          for svc in \
            tinai-llama tinai-webui tinai-sillytavern tinai-code \
            tinai-aider tinai-openfang tinai-embeddings tinai-qdrant \
            tinai-vision tinai-comfyui tinai-swap tinai-caddy tinai-filebrowser
          do
            if grep -q "container_name: $svc" docker-compose.yml; then
              echo "✅ $svc"
            else
              echo "❌ $svc MANQUANT"
              ALL_OK=false
            fi
          done
          $ALL_OK || exit 1

      - name: Start all services
        run: |
          cd TinAI
          docker compose up -d
          docker compose ps

      - name: Wait for services
        run: |
          wait_for() {
            local name=$1 url=$2 max=${3:-120} i=0
            printf "⏳ %-40s" "$name"
            while ! curl -sSf --max-time 5 "$url" >/dev/null 2>&1; do
              sleep 5; i=$((i+5))
              if [ $i -ge $max ]; then echo "⚠️  timeout ${max}s"; return 1; fi
            done
            echo "✅ ${i}s"
          }
          wait_for "Open-WebUI   (3000)"  "http://127.0.0.1:3000/"              120 || true
          wait_for "SillyTavern  (8008)"  "http://127.0.0.1:8008/api/ping"      120 || true
          wait_for "Code-Server  (8080)"  "http://127.0.0.1:8080/"              120 || true
          wait_for "Embeddings   (8084)"  "http://127.0.0.1:8084/health"         90 || true
          wait_for "Qdrant       (6333)"  "http://127.0.0.1:6333/healthz"        60 || true
          wait_for "Vision       (8085)"  "http://127.0.0.1:8085/health"        120 || true
          wait_for "ComfyUI      (7860)"  "http://127.0.0.1:8188/"              180 || true
          wait_for "llama-swap   (11434)" "http://127.0.0.1:11434/health"        60 || true
          wait_for "Caddy        (80)"    "http://127.0.0.1:80/"                 60 || true
          wait_for "Filebrowser  (8083)"  "http://127.0.0.1:8083/"               60 || true

      - name: Run functional tests
        id: tests
        run: |
          FAILED=false
          ROWS=""

          check() {
            local name=$1 url=$2 required=${3:-true}
            if curl -sSf --max-time 10 "$url" >/dev/null 2>&1; then
              ROWS+="| $name | ✅ OK | \`$url\` |\n"
            else
              ROWS+="| $name | ❌ FAIL | \`$url\` |\n"
              [ "$required" = "true" ] && FAILED=true
            fi
          }

          # Services critiques (font échouer le CI)
          check "Open-WebUI (3000)"    "http://127.0.0.1:3000/"           true
          check "SillyTavern (8008)"   "http://127.0.0.1:8008/api/ping"   true
          check "Code-Server (8080)"   "http://127.0.0.1:8080/"           true
          check "Embeddings (8084)"    "http://127.0.0.1:8084/health"     true
          check "Qdrant (6333)"        "http://127.0.0.1:6333/healthz"    true
          check "Vision (8085)"        "http://127.0.0.1:8085/health"     true
          check "llama-swap (11434)"   "http://127.0.0.1:11434/health"    true
          check "Caddy (80)"           "http://127.0.0.1:80/"             true
          check "Filebrowser (8083)"   "http://127.0.0.1:8083/"           true

          # Services optionnels (loggés mais ne font pas échouer le CI)
          check "OpenFang (4200)"      "http://127.0.0.1:4200/"           false
          check "ComfyUI (8188)"       "http://127.0.0.1:8188/"           false

          # llama-server : conteneur actif (modèle téléchargé au 1er run)
          if docker ps --format '{{.Names}}' | grep -q "tinai-llama"; then
            ROWS+="| llama-server (8081) | ✅ Conteneur actif | modèle en dl au 1er run |\n"
          else
            ROWS+="| llama-server (8081) | ❌ Conteneur arrêté | \`docker logs tinai-llama\` |\n"
            FAILED=true
          fi

          # Aider : juste vérifier que le conteneur existe (pas de port exposé)
          if docker ps --format '{{.Names}}' | grep -q "tinai-aider"; then
            ROWS+="| Aider | ✅ Conteneur actif | CLI uniquement |\n"
          else
            ROWS+="| Aider | ⚠️ Absent | optionnel |\n"
          fi

          CLI_OUT=$(tinai status 2>&1) && \
            ROWS+="| CLI \`tinai status\` | ✅ OK | - |\n" || \
            ROWS+="| CLI \`tinai status\` | ❌ FAIL | - |\n"

          CONTAINERS=$(cd TinAI && docker compose ps 2>&1)

          cat > TEST-REPORT.md << REPORT
          ## 🧪 TinAI v2 – Test Report

          **Date :** $(date -u +"%Y-%m-%d %H:%M UTC")
          **Run :** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Commit :** \`${{ github.sha }}\`
          **Branch :** \`${{ github.ref_name }}\`

          ### Résultats

          | Service | Statut | Endpoint |
          |---------|--------|----------|
          $(echo -e "$ROWS")

          ### État des conteneurs

          \`\`\`
          $CONTAINERS
          \`\`\`

          ### tinai status

          \`\`\`
          $CLI_OUT
          \`\`\`

          ### Notes
          - **llama-server** télécharge Qwen2.5-Coder-3B (~3 GB) au 1er démarrage
          - **Vision** utilise LLaVA-Phi-3-mini (1 seul fichier GGUF, pas de mmproj séparé)
          - **OpenFang** buildé depuis source (image cachée entre les runs) — restart: on-failure
          - **Aider** daemon maintenu par \`tail -f /dev/null\` — restart: on-failure
          - **ComfyUI** expose en interne sur le port 8188 (mappé vers 7860 sur l'hôte)
          - **Qdrant** healthcheck sur \`/healthz\` (pas \`/health\`)
          - **Ports configurables** via \`.env\` (copié depuis \`.env.example\`)
          REPORT

          cat TEST-REPORT.md
          $FAILED && echo "failed=true" >> $GITHUB_OUTPUT || echo "failed=false" >> $GITHUB_OUTPUT

      - name: Upload TEST-REPORT artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TEST-REPORT-v2
          path: TEST-REPORT.md

      - name: Commit TEST-REPORT.md
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🧪 CI v2 #${{ github.run_number }} – TEST-REPORT"
          file_pattern: TEST-REPORT.md openfang-version.txt

      - name: Fail on test failures
        if: steps.tests.outputs.failed == 'true'
        run: |
          echo "❌ Tests échoués – voir TEST-REPORT.md"
          exit 1

      - name: Teardown
        if: always()
        run: |
          docker compose -f TinAI/docker-compose.yml down --remove-orphans -v
          docker system prune -f
