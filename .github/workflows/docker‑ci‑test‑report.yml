name: CI – TinAI Deploy & Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # OpenFang n'a pas d'image publiée → build depuis le source
      - name: Build OpenFang image
        run: |
          git clone --depth=1 https://github.com/RightNow-AI/openfang.git /tmp/openfang
          docker build -t tinai-openfang:latest /tmp/openfang
          echo "✅ tinai-openfang:latest buildée"

      # Générer le docker-compose.yml via install.sh en mode CI
      - name: Generate docker-compose.yml
        run: |
          chmod +x install.sh
          CI=true ./install.sh
          echo "── docker-compose.yml généré ──"
          cat TinAI/docker-compose.yml

      # Valider la syntaxe YAML
      - name: Validate docker-compose syntax
        run: |
          cd TinAI
          docker compose config > /dev/null
          echo "✅ Syntaxe valide"

      # Vérifier que tous les services sont bien définis
      - name: Check all services defined
        run: |
          cd TinAI
          for svc in tinai-llama tinai-webui tinai-code tinai-aider tinai-openfang tinai-lancedb tinai-swap tinai-caddy tinai-filebrowser; do
            grep -q "container_name: $svc" docker-compose.yml \
              && echo "✅ $svc" \
              || { echo "❌ $svc MANQUANT"; exit 1; }
          done

      # Démarrer tous les services
      - name: Start all services
        run: |
          cd TinAI
          docker compose up -d
          docker compose ps

      # Attendre que les services répondent
      - name: Wait for services
        run: |
          wait_for() {
            local name=$1 url=$2 max=${3:-120} i=0
            printf "⏳ %-35s" "$name"
            while ! curl -sSf --max-time 5 "$url" >/dev/null 2>&1; do
              sleep 5; i=$((i+5))
              if [ $i -ge $max ]; then
                echo "⚠️  timeout ${max}s"
                return 1
              fi
            done
            echo "✅ up en ${i}s"
          }
          wait_for "Open-WebUI   (3000)" "http://127.0.0.1:3000/"       120 || true
          wait_for "Code-Server  (8080)" "http://127.0.0.1:8080/"       120 || true
          wait_for "OpenFang     (4200)" "http://127.0.0.1:4200/"       120 || true
          wait_for "LanceDB      (8082)" "http://127.0.0.1:8082/health"  90 || true
          wait_for "llama-swap   (11434)" "http://127.0.0.1:11434/health" 90 || true
          wait_for "Caddy        (80)"   "http://127.0.0.1:80/"          60 || true
          wait_for "Filebrowser  (8083)" "http://127.0.0.1:8083/"        60 || true

      # Tests fonctionnels + génération du rapport
      - name: Run functional tests
        id: tests
        run: |
          FAILED=false
          ROWS=""

          check() {
            local name=$1 url=$2
            if curl -sSf --max-time 10 "$url" >/dev/null 2>&1; then
              ROWS+="| $name | ✅ OK | \`$url\` |\n"
            else
              ROWS+="| $name | ❌ FAIL | \`$url\` |\n"
              FAILED=true
            fi
          }

          check "Open-WebUI (3000)"    "http://127.0.0.1:3000/"
          check "Code-Server (8080)"   "http://127.0.0.1:8080/"
          check "OpenFang (4200)"      "http://127.0.0.1:4200/"
          check "LanceDB (8082)"       "http://127.0.0.1:8082/health"
          check "llama-swap (11434)"   "http://127.0.0.1:11434/health"
          check "Caddy (80)"           "http://127.0.0.1:80/"
          check "Filebrowser (8083)"   "http://127.0.0.1:8083/"

          # llama-server : on vérifie que le conteneur tourne
          # (le modèle 3GB se télécharge au 1er run, pas bloquant pour le test)
          if docker ps --format '{{.Names}}' | grep -q "tinai-llama"; then
            ROWS+="| llama-server (8081) | ✅ Conteneur actif | modèle en dl au 1er run |\n"
          else
            ROWS+="| llama-server (8081) | ❌ Conteneur arrêté | \`docker logs tinai-llama\` |\n"
            FAILED=true
          fi

          # État détaillé des conteneurs
          CONTAINERS=$(cd TinAI && docker compose ps 2>&1)

          cat > TEST-REPORT.md << REPORT
          ## 🧪 TinAI – Test Report

          **Date :** $(date -u +"%Y-%m-%d %H:%M UTC")
          **Run :** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Commit :** \`${{ github.sha }}\`
          **Branch :** \`${{ github.ref_name }}\`

          ### Résultats des tests

          | Service | Statut | Endpoint |
          |---------|--------|----------|
          $(echo -e "$ROWS")

          ### État des conteneurs

          \`\`\`
          $CONTAINERS
          \`\`\`

          ### Notes
          - llama-server télécharge Qwen2.5-Coder-3B (~3 GB) au premier démarrage
          - OpenFang buildé depuis [RightNow-AI/openfang](https://github.com/RightNow-AI/openfang)
          - llama-swap utilise l'image officielle \`ghcr.io/mostlygeek/llama-swap:cpu\`
          REPORT

          cat TEST-REPORT.md

          if $FAILED; then
            echo "failed=true"  >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

      # Upload du rapport comme artefact
      - name: Upload TEST-REPORT artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TEST-REPORT
          path: TEST-REPORT.md

      # Commit du rapport dans le repo
      - name: Commit TEST-REPORT.md
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🧪 CI #${{ github.run_number }} – TEST-REPORT"
          file_pattern: TEST-REPORT.md

      # Fail le job si des tests ont échoué
      - name: Fail on test failures
        if: steps.tests.outputs.failed == 'true'
        run: |
          echo "❌ Des tests ont échoué – voir TEST-REPORT.md"
          exit 1

      # Nettoyage
      - name: Teardown
        if: always()
        run: |
          docker compose -f TinAI/docker-compose.yml down --remove-orphans -v
          docker system prune -f
```

---

**Structure finale de ton repo :**
```
TinAI/
├── install.sh
└── .github/
    └── workflows/
        └── ci.yml
```