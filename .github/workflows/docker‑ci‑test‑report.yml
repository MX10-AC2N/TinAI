name: CI – Build, Test Docker & Publish TEST‑REPORT

# ------------------------------------------------------------------
# Quand le workflow doit‑il s’exécuter ?
# ------------------------------------------------------------------
on:
  push:
    branches: [ main ]          # à chaque push sur la branche principale
  pull_request:
    branches: [ main ]          # et à chaque PR vers main
  workflow_dispatch:           # déclenchement manuel depuis l’onglet Actions
  schedule:
    - cron: "0 4 * * *"        # (optionnel) exécution quotidienne à 04 h UTC

# ------------------------------------------------------------------
# Jobs
# ------------------------------------------------------------------
jobs:
  # --------------------------------------------------------------
  # 1️⃣ Build les images Docker et démarre les services
  # --------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30          # évite les jobs bloqués indéfiniment
    permissions:
      contents: write           # nécessaire pour pousser le rapport
      issues: write             # (facultatif) si tu veux créer une issue en cas d’échec

    steps:
      # ------------------------------------------------------------------
      # 0️⃣ Checkout du dépôt (inclut install.sh, docker‑compose.yml, etc.)
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 1️⃣ Installer Docker (déjà présent sur ubuntu‑latest) et docker‑compose v2
      # ------------------------------------------------------------------
      - name: Install Docker Compose (v2)
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64" \
            -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker compose version

      # ------------------------------------------------------------------
      # 2️⃣ Construire toutes les images définies dans docker‑compose.yml
      # ------------------------------------------------------------------
      - name: Build Docker images
        run: |
          docker compose build --pull

      # ------------------------------------------------------------------
      # 3️⃣ Démarrer les services en mode détaché
      # ------------------------------------------------------------------
      - name: Start services
        run: |
          docker compose up -d

      # ------------------------------------------------------------------
      # 4️⃣ Attendre que les conteneurs soient prêts (health‑check loop)
      # ------------------------------------------------------------------
      - name: Wait for services to become healthy
        env:
          MAX_WAIT: 120          # secondes max d’attente
        run: |
          echo "🔎 Attente de la disponibilité des services…"
          start=$(date +%s)
          while true; do
            # 1️⃣ Llama‑server (port 8081) – endpoint /healthz ou /v1/models
            if curl -sSf http://127.0.0.1:8081/v1/models >/dev/null 2>&1; then
              echo "✅ llama‑server OK"
            else
              echo "⏳ waiting for llama‑server…"
            fi

            # 2️⃣ Open‑WebUI (port 3000) – endpoint /
            if curl -sSf http://127.0.0.1:3000/ >/dev/null 2>&1; then
              echo "✅ open‑webui OK"
            else
              echo "⏳ waiting for open‑webui…"
            fi

            # 3️⃣ Code‑Server (port 8080) – endpoint /
            if curl -sSf http://127.0.0.1:8080/ >/dev/null 2>&1; then
              echo "✅ code‑server OK"
            else
              echo "⏳ waiting for code‑server…"
            fi

            # 4️⃣ OpenFang (port 4200) – endpoint /
            if curl -sSf http://127.0.0.1:4200/ >/dev/null 2>&1; then
              echo "✅ openfang OK"
            else
              echo "⏳ waiting for openfang…"
            fi

            # 5️⃣ LanceDB (port 8082) – endpoint /
            if curl -sSf http://127.0.0.1:8082/ >/dev/null 2>&1; then
              echo "✅ lancedb OK"
            else
              echo "⏳ waiting for lancedb…"
            fi

            # 6️⃣ Caddy (port 80) – endpoint /
            if curl -sSf http://127.0.0.1/ >/dev/null 2>&1; then
              echo "✅ caddy OK"
            else
              echo "⏳ waiting for caddy…"
            fi

            # Tous les services qui existent dans le compose sont OK ?
            # (on ignore les services qui ne sont pas présents)
            ALL_OK=true
            for svc in llama-server open-webui code-server openfang lancedb caddy; do
              if docker compose ps $svc | grep -q "Exit"; then
                ALL_OK=false
              fi
            done

            now=$(date +%s)
            elapsed=$((now-start))
            if $ALL_OK && [ $elapsed -gt 5 ]; then
              echo "✅ All reachable services are up after $elapsed s"
              break
            fi
            if [ $elapsed -ge $MAX_WAIT ]; then
              echo "❌ Timeout after $MAX_WAIT s – some services are still unavailable"
              break
            fi
            sleep 5
          done

      # ------------------------------------------------------------------
      # 5️⃣ Exécuter les tests fonctionnels (exemple basique)
      # ------------------------------------------------------------------
      - name: Run functional tests
        id: functional_tests
        run: |
          set -euo pipefail

          REPORT="## 🧪 Test Report – $(date -u +"%Y-%m-%d %H:%M UTC")\n\n"

          # Helper to append result
          add_result() {
            local name="$1"
            local status="$2"
            local detail="${3:-}"
            if [ "$status" = "OK" ]; then
              REPORT+="* ✅ **$name** – $status\n"
            else
              REPORT+="* ❌ **$name** – $status\n"
              [ -n "$detail" ] && REPORT+="  - Details: $detail\n"
            fi
          }

          # -------- Llama‑server ----------
          if curl -sSf http://127.0.0.1:8081/v1/models >/dev/null 2>&1; then
            add_result "Llama‑server (8081)" "OK"
          else
            add_result "Llama‑server (8081)" "FAIL" "No response on /v1/models"
          fi

          # -------- Open‑WebUI ----------
          if curl -sSf http://127.0.0.1:3000/api/v1/models >/dev/null 2>&1; then
            add_result "Open‑WebUI (3000)" "OK"
          else
            # fallback to root page
            if curl -sSf http://127.0.0.1:3000/ >/dev/null 2>&1; then
              add_result "Open‑WebUI (3000)" "OK (root reachable)"
            else
              add_result "Open‑WebUI (3000)" "FAIL" "Neither API nor root responded"
            fi
          fi

          # -------- Code‑Server ----------
          if curl -sSf -I http://127.0.0.1:8080/ | grep -iq "200"; then
            add_result "Code‑Server (8080)" "OK"
          else
            add_result "Code‑Server (8080)" "FAIL" "HTTP 200 not returned"
          fi

          # -------- OpenFang ----------
          if curl -sSf http://127.0.0.1:4200/ >/dev/null 2>&1; then
            add_result "OpenFang (4200)" "OK"
          else
            add_result "OpenFang (4200)" "FAIL" "Root page unreachable"
          fi

          # -------- LanceDB ----------
          if curl -sSf http://127.0.0.1:8082/health >/dev/null 2>&1; then
            add_result "LanceDB (8082)" "OK"
          else
            add_result "LanceDB (8082)" "FAIL" "Health endpoint not reachable"
          fi

          # -------- Caddy ----------
          if curl -sSf http://127.0.0.1/ >/dev/null 2>&1; then
            add_result "Caddy (80)" "OK"
          else
            add_result "Caddy (80)" "FAIL" "Reverse‑proxy not responding"
          fi

          # Write the report to a file
          echo -e "$REPORT" > TEST-REPORT.md

          # Export a flag for later steps (used to fail the job if any test failed)
          if grep -q "❌" TEST-REPORT.md; then
            echo "some_failed=true" >> $GITHUB_OUTPUT
          else
            echo "some_failed=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------------------------------
      # 6️⃣ Publier le rapport comme artefact (utile même si le commit échoue)
      # ------------------------------------------------------------------
      - name: Upload TEST‑REPORT artifact
        uses: actions/upload-artifact@v4
        with:
          name: test‑report
          path: TEST-REPORT.md

      # ------------------------------------------------------------------
      # 7️⃣ Commit / Update TEST‑REPORT.md dans le dépôt
      # ------------------------------------------------------------------
      - name: Commit TEST‑REPORT.md
        if: always()                     # on veut toujours pousser le rapport, même en échec
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🧪 CI – Update TEST‑REPORT.md"
          branch: ${{ github.ref_name }}
          file_pattern: TEST-REPORT.md
          # Si le fichier n’existe pas encore, il sera créé
          # Si le commit ne change rien (rapport identique), aucune nouvelle commit n’est créée
          # Cette action utilise le token GITHUB_TOKEN automatiquement

      # ------------------------------------------------------------------
      # 8️⃣ (Optionnel) Fail the job if any test failed – makes the PR red
      # ------------------------------------------------------------------
      - name: Fail job on test failures
        if: steps.functional_tests.outputs.some_failed == 'true'
        run: |
          echo "One or more functional tests failed – see TEST-REPORT.md"
          exit 1

      # ------------------------------------------------------------------
      # 9️⃣ Nettoyage – arrêter et supprimer les conteneurs
      # ------------------------------------------------------------------
      - name: Tear down Docker Compose
        if: always()
        run: |
          docker compose down --remove-orphans
          docker system prune -f --volumes