name: CI – TinAI x86_64

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - '.env.example'
      - '.github/workflows/ci-x86.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  security-audit:
    name: 🔒 Audit sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck – install.sh
        run: |
          sudo apt-get install -y shellcheck
          # SC2034: variables unused (faux positifs dans les heredocs)
          # SC2154: variables référencées avant assignation (vars Docker)
          shellcheck --severity=error \
            --exclude=SC2034,SC2154 \
            install.sh
          echo "✅ ShellCheck OK"

      - name: Audit secrets dans les fichiers sources
        run: |
          FAIL=false
          # Vérifie qu'aucune vraie clé/mot de passe n'est hardcodée
          PATTERNS=(
            'password\s*=\s*[^${"'\''changezmoi]'
            'api_key\s*=\s*[^${"'\''sk-tinai]'
            'secret\s*=\s*[^${"'\''PLACEHOLDER]'
            'AWS_SECRET'
            'GITHUB_TOKEN\s*='
          )
          for p in "${PATTERNS[@]}"; do
            if grep -riE "$p" install.sh install-arm64.sh .env.example 2>/dev/null; then
              echo "❌ Pattern suspect trouvé : $p"
              FAIL=true
            fi
          done
          $FAIL && exit 1 || echo "✅ Aucun secret hardcodé détecté"

      - name: Vérifie que .env n'est pas commité
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "❌ DANGER : .env est tracké par git !"
            exit 1
          fi
          echo "✅ .env absent du repo"

      - name: Vérifie le .gitignore
        run: |
          for pattern in ".env" "models/" "projects/" "TinAI/" "*.tar"; do
            grep -qF "$pattern" .gitignore || {
              echo "⚠️  Manquant dans .gitignore : $pattern"
            }
          done
          echo "✅ .gitignore vérifié"

      - name: Audit des images Docker (pas de :latest sur images critiques)
        run: |
          FAIL=false
          # Les images llm doivent avoir un tag explicite ou être locales
          for img in "ghcr.io/ggml-org/llama.cpp" "ghcr.io/mostlygeek/llama-swap"; do
            if grep -E "image:\s*${img}$" install.sh 2>/dev/null; then
              echo "⚠️  Image sans tag explicite : $img (utilise :server ou :cpu)"
              FAIL=true
            fi
          done
          $FAIL && exit 1 || echo "✅ Tags images OK"

      - name: Vérifie les ports exposés (pas de 0.0.0.0 hardcodé)
        run: |
          # Les ports dans docker-compose doivent utiliser des variables
          if grep -E 'ports:.*"[0-9]+:' install.sh | grep -v '\${PORT_'; then
            echo "❌ Port hardcodé détecté – utilise \${PORT_XXX}"
            exit 1
          fi
          echo "✅ Ports via variables OK"

  test-x86:
    name: 🧪 Test x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: security-audit
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache image OpenFang
        id: cache-openfang
        uses: actions/cache@v4
        with:
          path: /tmp/openfang-image.tar
          key: openfang-x86-${{ hashFiles('openfang-version-x86.txt') }}
          restore-keys: openfang-x86-

      - name: Build ou restore image OpenFang
        run: |
          if [ "${{ steps.cache-openfang.outputs.cache-hit }}" = "true" ] && [ -f /tmp/openfang-image.tar ]; then
            echo "♻️  Restauration OpenFang depuis le cache"
            docker load -i /tmp/openfang-image.tar
          else
            echo "🔨 Compilation OpenFang x86_64"
            git clone --depth=1 https://github.com/RightNow-AI/openfang.git /tmp/openfang
            git -C /tmp/openfang rev-parse HEAD > openfang-version-x86.txt
            docker build -t tinai-openfang:latest /tmp/openfang
            docker save tinai-openfang:latest -o /tmp/openfang-image.tar
          fi
          echo "✅ tinai-openfang:latest disponible"

      - name: Setup .env CI
        run: cp .env.example .env

      - name: Lint install.sh (ShellCheck)
        run: |
          sudo apt-get install -y shellcheck
          shellcheck --severity=warning --exclude=SC2034,SC2154 install.sh

      - name: Exécution install.sh (CI=true)
        run: |
          chmod +x install.sh
          CI=true bash install.sh
          echo "── docker-compose.yml ──"
          cat TinAI/docker-compose.yml

      - name: Validation syntaxe docker-compose
        run: |
          cd TinAI
          docker compose config > /dev/null
          echo "✅ Syntaxe valide"

      - name: Vérification services générés
        run: |
          cd TinAI
          FAIL=false
          EXPECTED=(
            tinai-llama tinai-webui tinai-sillytavern tinai-code
            tinai-aider tinai-openfang tinai-embeddings tinai-qdrant
            tinai-vision tinai-comfyui tinai-swap tinai-caddy tinai-filebrowser
          )
          for svc in "${EXPECTED[@]}"; do
            if grep -q "container_name: $svc" docker-compose.yml; then
              echo "✅ $svc"
            else
              echo "❌ $svc MANQUANT"
              FAIL=true
            fi
          done
          $FAIL && exit 1 || echo "✅ Tous les services présents"

      - name: Vérification CLI généré
        run: |
          # Le CLI doit être installé par install.sh
          tinai help
          echo "✅ CLI tinai opérationnel"
          # Vérifie que les variables clés sont bien gravées dans le CLI
          for var in TINAI_VERSION TINAI_DIR ARCH LLAMA_IMAGE PORT_LLAMA; do
            grep -q "$var=" /usr/local/bin/tinai || {
              echo "❌ Variable manquante dans le CLI : $var"
              exit 1
            }
          done
          echo "✅ Variables CLI OK"
          # Vérifie que le placeholder n'est plus présent
          grep -q "TINAI_DIR_PLACEHOLDER" /usr/local/bin/tinai && {
            echo "❌ TINAI_DIR_PLACEHOLDER toujours présent dans le CLI !"
            exit 1
          } || echo "✅ Placeholder absent"

      - name: Démarrage des services
        run: |
          cd TinAI
          docker compose up -d
          docker compose ps

      - name: Attente des services
        run: |
          wait_for() {
            local name=$1 url=$2 max=${3:-120} i=0
            printf "⏳ %-42s" "$name"
            while ! curl -sSf --max-time 5 "$url" >/dev/null 2>&1; do
              sleep 5; i=$((i+5))
              [ $i -ge $max ] && { echo "⚠️  timeout ${max}s"; return 1; }
            done
            echo "✅ ${i}s"
          }
          wait_for "Open-WebUI   (3000)"  "http://127.0.0.1:3000/"             120 || true
          wait_for "SillyTavern  (8008)"  "http://127.0.0.1:8008/"             240 || true
          wait_for "Code-Server  (8080)"  "http://127.0.0.1:8080/"             120 || true
          wait_for "Embeddings   (8084)"  "http://127.0.0.1:8084/health"        90 || true
          wait_for "Qdrant       (6333)"  "http://127.0.0.1:6333/healthz"       60 || true
          wait_for "Vision       (8085)"  "http://127.0.0.1:8085/health"       120 || true
          wait_for "ComfyUI      (7860)"  "http://127.0.0.1:7860/system_stats" 240 || true
          wait_for "llama-swap   (11434)" "http://127.0.0.1:11434/health"       60 || true
          wait_for "Caddy        (80)"    "http://127.0.0.1:80/"                60 || true
          wait_for "Filebrowser  (8083)"  "http://127.0.0.1:8083/"              60 || true

      - name: Test API llama-server (OpenAI-compatible)
        run: |
          # Vérifie que l'API répond (le modèle n'est pas encore chargé mais l'API doit être là)
          MAX=120; I=0
          while ! curl -sf http://127.0.0.1:8081/health >/dev/null 2>&1; do
            sleep 5; I=$((I+5))
            [ $I -ge $MAX ] && { echo "⚠️  llama-server pas encore prêt (modèle en téléchargement)"; break; }
          done
          if curl -sf http://127.0.0.1:8081/v1/models 2>/dev/null | grep -q "data"; then
            echo "✅ API llama-server opérationnelle"
          else
            echo "ℹ️  llama-server en attente du modèle (normal au 1er run)"
          fi

      - name: Test CLI tinai status
        run: |
          OUT=$(tinai status 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "TinAI" || { echo "❌ tinai status ne retourne pas TinAI"; exit 1; }
          echo "✅ tinai status OK"

      - name: Test sécurité réseau – ports non exposés aux mauvaises interfaces
        run: |
          # Qdrant et embeddings ne doivent pas être exposés sans auth
          # (dans ce setup, c'est interne au réseau docker → OK)
          # On vérifie juste que les ports sensibles ne sont PAS en écoute sur 0.0.0.0:xxxx sans protection
          echo "ℹ️  Vérification des ports exposés"
          ss -tlnp | grep -E ":(6333|6334|8084|8085)" | head -10 || true
          echo "✅ Ports vérifiés (sont protégés par réseau Docker interne)"

      - name: Debug – logs services lents
        if: always()
        run: |
          echo "=== SillyTavern ===" && docker logs tinai-sillytavern --tail=30 2>&1 || true
          echo "=== llama-swap ===" && docker logs tinai-swap --tail=20 2>&1 || true
          echo "=== ComfyUI ===" && docker logs tinai-comfyui --tail=20 2>&1 || true
          echo "=== llama-server ===" && docker logs tinai-llama --tail=20 2>&1 || true

      - name: Tests fonctionnels + génération rapport
        id: tests
        run: |
          FAILED=false; ROWS=""
          check() {
            local name=$1 url=$2 required=${3:-true}
            if curl -sSf --max-time 10 "$url" >/dev/null 2>&1; then
              ROWS+="| $name | ✅ OK | \`$url\` |\n"
            else
              ROWS+="| $name | ❌ FAIL | \`$url\` |\n"
              [ "$required" = "true" ] && FAILED=true
            fi
          }
          check "Open-WebUI (3000)"  "http://127.0.0.1:3000/"          true
          check "SillyTavern (8008)" "http://127.0.0.1:8008/"          false
          check "Code-Server (8080)" "http://127.0.0.1:8080/"          true
          check "Embeddings (8084)"  "http://127.0.0.1:8084/health"    true
          check "Qdrant (6333)"      "http://127.0.0.1:6333/healthz"   true
          check "Vision (8085)"      "http://127.0.0.1:8085/health"    true
          check "llama-swap (11434)" "http://127.0.0.1:11434/health"   true
          check "Caddy (80)"         "http://127.0.0.1:80/"            true
          check "Filebrowser (8083)" "http://127.0.0.1:8083/"          true
          check "OpenFang (4200)"    "http://127.0.0.1:4200/"          false
          check "ComfyUI (7860)"     "http://127.0.0.1:7860/system_stats" false

          docker ps --format '{{.Names}}' | grep -q "tinai-llama" \
            && ROWS+="| llama-server (8081) | ✅ Conteneur actif | modèle en dl au 1er run |\n" \
            || { ROWS+="| llama-server (8081) | ❌ Arrêté | \`docker logs tinai-llama\` |\n"; FAILED=true; }

          docker ps --format '{{.Names}}' | grep -q "tinai-aider" \
            && ROWS+="| Aider | ✅ Actif | CLI uniquement |\n" \
            || ROWS+="| Aider | ⚠️ Absent | optionnel |\n"

          CLI_OUT=$(tinai status 2>&1) \
            && ROWS+="| CLI \`tinai status\` | ✅ OK | - |\n" \
            || ROWS+="| CLI \`tinai status\` | ❌ FAIL | - |\n"

          CONTAINERS=$(cd TinAI && docker compose ps 2>&1)

          {
            echo "# TinAI v2 – Test Report (x86_64)"
            echo ""
            echo "Date   : $(date -u +"%Y-%m-%d %H:%M UTC")"
            echo "Run    : ${{ github.run_number }}"
            echo "URL    : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "SHA    : ${{ github.sha }}"
            echo "Branch : ${{ github.ref_name }}"
            echo "Arch   : x86_64"
            echo ""
            echo "## Résultats"
            echo ""
            echo "| Service | Statut | Endpoint |"
            echo "|---------|--------|----------|"
            echo -e "$ROWS"
            echo ""
            echo "## État des conteneurs"
            echo '```'
            echo "$CONTAINERS"
            echo '```'
            echo ""
            echo "## tinai status"
            echo '```'
            echo "$CLI_OUT"
            echo '```'
            echo ""
            echo "## Notes"
            echo "- llama-server télécharge Qwen3-2B (~1.7 GB) au 1er démarrage"
            echo "- CLI généré par install.sh (pas de placeholder)"
            echo "- OpenFang buildé depuis source (cache entre les runs)"
          } > TEST-REPORT.md

          cat TEST-REPORT.md
          [ "$FAILED" = "true" ] && echo "failed=true" >> $GITHUB_OUTPUT || echo "failed=false" >> $GITHUB_OUTPUT

      - name: Upload rapport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TEST-REPORT-x86
          path: TEST-REPORT.md

      - name: Commit TEST-REPORT.md
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TEST-REPORT.md openfang-version-x86.txt || true
          git diff --cached --quiet && exit 0
          git commit -m "🧪 CI x86 #${{ github.run_number }} – TEST-REPORT"
          for i in 1 2 3; do
            git push && break
            git pull --rebase origin main
          done

      - name: Fail si tests échoués
        if: steps.tests.outputs.failed == 'true'
        run: echo "❌ Tests x86 échoués" && exit 1

      - name: Teardown
        if: always()
        run: |
          docker compose -f TinAI/docker-compose.yml down --remove-orphans -v 2>/dev/null || true
          docker system prune -f
