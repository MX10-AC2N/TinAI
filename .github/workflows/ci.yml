name: CI - TinAI v3

"on":
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - ".env.example"
      - "supervisord.conf"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ================================================================
  # JOB 1 - Audit securite
  # ================================================================
  security-audit:
    name: Audit securite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck -q
          shellcheck --severity=error --exclude=SC2034,SC2154,SC1091 \
            scripts/start-llama.sh \
            scripts/start-webui.sh \
            scripts/start-openfang.sh \
            scripts/healthcheck.sh
          echo "ShellCheck OK"

      - name: Audit secrets hardcodes
        run: |
          FAIL=false
          FILES="Dockerfile docker-compose.yml .env.example supervisord.conf"
          for p in 'AWS_SECRET' 'GITHUB_TOKEN\s*='; do
            if grep -riE "$p" $FILES 2>/dev/null; then
              echo "FAIL - pattern suspect : $p"
              FAIL=true
            fi
          done
          for p in 'password\s*=\s*"[^$]' 'SECRET_KEY\s*=\s*"[^$]'; do
            if grep -riE "$p" $FILES 2>/dev/null; then
              echo "FAIL - valeur hardcodee : $p"
              FAIL=true
            fi
          done
          if [ "$FAIL" = "true" ]; then exit 1; fi
          echo "Aucun secret hardcode"

      - name: Verif .env absent du repo
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "DANGER - .env est tracke par git"
            exit 1
          fi
          echo ".env absent OK"

      - name: Verif .gitignore
        run: |
          for pattern in ".env" "models/" "data/"; do
            grep -qF "$pattern" .gitignore || echo "Manquant dans .gitignore : $pattern"
          done
          echo ".gitignore OK"

      - name: Verif ports via variables
        run: |
          if grep -E '^\s+-\s+"[0-9]+:[0-9]+"' docker-compose.yml; then
            echo "FAIL - port hardcode detecte"
            exit 1
          fi
          echo "Ports via variables OK"

  # ================================================================
  # JOB 2 - Build et test (matrice amd64 / arm64)
  # ================================================================
  build-test:
    name: Build et Test - ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: security-audit
    timeout-minutes: 90
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/buildx-cache
          key: buildx-${{ matrix.arch }}-${{ hashFiles('Dockerfile', 'supervisord.conf') }}
          restore-keys: |
            buildx-${{ matrix.arch }}-

      - name: Setup .env CI
        run: |
          cp .env.example .env
          echo "LLAMA_HF_FILE=qwen3-1.7b-q4_k_m.gguf" >> .env
          echo "LLAMA_THREADS=2" >> .env
          echo "LLAMA_CTX_SIZE=2048" >> .env
          echo "MEM_LIMIT=5g" >> .env
          echo "TINAI_IMAGE=tinai:v3-${{ matrix.arch }}" >> .env

      - name: Lint docker-compose
        run: |
          docker compose config > /dev/null
          echo "Syntaxe docker-compose valide"

      - name: Build image tinai:v3-${{ matrix.arch }}
        run: |
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --cache-from "type=local,src=/tmp/buildx-cache" \
            --cache-to   "type=local,dest=/tmp/buildx-cache-new,mode=max" \
            --load \
            -t "tinai:v3-${{ matrix.arch }}" \
            .
          rm -rf /tmp/buildx-cache
          mv /tmp/buildx-cache-new /tmp/buildx-cache
          echo "Build ${{ matrix.arch }} OK"

      - name: Taille de l image
        run: |
          docker images "tinai:v3-${{ matrix.arch }}" --format "Taille : {{.Size}}"

      - name: Preparation volumes
        run: mkdir -p models data/webui data/openfang

      - name: Demarrage du conteneur
        run: |
          docker compose up -d
          docker compose ps

      - name: Attente des services
        run: |
          wait_for() {
            local name="$1" url="$2" max="${3:-90}" i=0
            echo "Attente $name ..."
            while ! curl -sSf --max-time 5 "$url" > /dev/null 2>&1; do
              sleep 5
              i=$((i + 5))
              if [ "$i" -ge "$max" ]; then
                echo "Timeout ${max}s pour $name"
                return 1
              fi
            done
            echo "OK $name en ${i}s"
          }
          wait_for "Open WebUI 3000"   "http://127.0.0.1:3000/"        90 || true
          wait_for "OpenFang 4200"     "http://127.0.0.1:4200/"       120 || true
          wait_for "llama-server 8081" "http://127.0.0.1:8081/health"  30 || true

      - name: Tests fonctionnels
        id: tests
        run: |
          FAILED=false
          ARCH="${{ matrix.arch }}"
          API_KEY="sk-tinai"

          check_url() {
            local name="$1" url="$2" required="$3"
            if curl -sSf --max-time 10 "$url" > /dev/null 2>&1; then
              echo "OK  | $name"
            else
              echo "KO  | $name"
              if [ "$required" = "true" ]; then FAILED=true; fi
            fi
          }

          check_url "Open WebUI 3000" "http://127.0.0.1:3000/" "true"
          check_url "OpenFang 4200"   "http://127.0.0.1:4200/" "false"

          if curl -sSf --max-time 5 \
              -H "Authorization: Bearer ${API_KEY}" \
              "http://127.0.0.1:8081/health" > /dev/null 2>&1; then
            echo "OK  | llama-server API repond"
          else
            echo "KO  | llama-server - modele absent en CI (attendu)"
          fi

          SUPERVISOR=$(docker compose exec -T tinai supervisorctl status 2>&1 || echo "N/A")
          CONTAINERS=$(docker compose ps 2>&1)
          IMG_SIZE=$(docker images "tinai:v3-${{ matrix.arch }}" --format "{{.Size}}")
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          LOG_LLAMA=$(docker compose exec -T tinai tail -n 20 /var/log/tinai/llama.log 2>/dev/null || echo "N/A")
          LOG_WEBUI=$(docker compose exec -T tinai tail -n 10 /var/log/tinai/webui.log 2>/dev/null || echo "N/A")
          LOG_FANG=$(docker compose exec -T tinai tail -n 10 /var/log/tinai/openfang.log 2>/dev/null || echo "N/A")

          REPORT="TEST-REPORT-${ARCH}.md"

          printf '# TinAI v3 - Test Report (%s)\n\n' "$ARCH"            > "$REPORT"
          printf '**Date   :** %s\n' "$BUILD_DATE"                      >> "$REPORT"
          printf '**Run    :** [#%s](%s/%s/actions/runs/%s)\n' \
            "${{ github.run_number }}" \
            "${{ github.server_url }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}"                                       >> "$REPORT"
          printf '**Commit :** `%s`\n' "${{ github.sha }}"              >> "$REPORT"
          printf '**Branch :** `%s`\n' "${{ github.ref_name }}"         >> "$REPORT"
          printf '**Arch   :** `%s` (`%s`)\n' \
            "$ARCH" "${{ matrix.platform }}"                            >> "$REPORT"
          printf '**Image  :** `tinai:v3-%s` - %s\n\n' \
            "$ARCH" "$IMG_SIZE"                                         >> "$REPORT"
          printf '---\n\n## Etat du conteneur\n\n```\n%s\n```\n\n' \
            "$CONTAINERS"                                               >> "$REPORT"
          printf '## Services supervisord\n\n```\n%s\n```\n\n' \
            "$SUPERVISOR"                                               >> "$REPORT"
          printf '## Logs llama-server\n\n```\n%s\n```\n\n' \
            "$LOG_LLAMA"                                                >> "$REPORT"
          printf '## Logs Open WebUI\n\n```\n%s\n```\n\n' \
            "$LOG_WEBUI"                                                >> "$REPORT"
          printf '## Logs OpenFang\n\n```\n%s\n```\n\n' \
            "$LOG_FANG"                                                 >> "$REPORT"
          printf '---\n\n## Notes\n'                                    >> "$REPORT"
          printf '- llama-server : modele non telecharge en CI\n'       >> "$REPORT"
          printf '- Open WebUI : interface disponible sans modele\n'    >> "$REPORT"
          printf '- OpenFang : config generee automatiquement\n'        >> "$REPORT"

          cat "$REPORT"

          if [ "$FAILED" = "true" ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug logs si echec
        if: failure()
        run: |
          docker compose logs --tail=60 || true
          docker compose exec -T tinai supervisorctl status || true

      - name: Upload TEST-REPORT-${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TEST-REPORT-${{ matrix.arch }}
          path: TEST-REPORT-${{ matrix.arch }}.md

      - name: Teardown
        if: always()
        run: |
          docker compose down --remove-orphans -v 2>/dev/null || true
          docker system prune -f

      - name: Echec si tests critiques ko
        if: steps.tests.outputs.failed == 'true'
        run: |
          echo "Tests critiques echoues sur ${{ matrix.arch }}"
          exit 1

  # ================================================================
  # JOB 3 - Rapport consolide + commit TEST-REPORT.md
  # ================================================================
  report:
    name: Rapport consolide
    runs-on: ubuntu-latest
    needs: build-test
    if: "always() && github.event_name != 'pull_request'"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download rapports
        uses: actions/download-artifact@v4
        with:
          pattern: TEST-REPORT-*
          merge-multiple: true
          path: reports/

      - name: Generation TEST-REPORT.md consolide
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            printf '# TinAI v3 - Test Report\n\n'
            printf '**Date   :** %s\n' "$BUILD_DATE"
            printf '**Run    :** [#%s](%s/%s/actions/runs/%s)\n' \
              "${{ github.run_number }}" \
              "${{ github.server_url }}" \
              "${{ github.repository }}" \
              "${{ github.run_id }}"
            printf '**Commit :** `%s`\n' "${{ github.sha }}"
            printf '**Branch :** `%s`\n\n' "${{ github.ref_name }}"
            printf '---\n\n'
            for arch in amd64 arm64; do
              printf '## %s\n\n' "$arch"
              if [ -f "reports/TEST-REPORT-${arch}.md" ]; then
                awk '/^## Etat/,/^## Services/' "reports/TEST-REPORT-${arch}.md" \
                  | grep -v "^## Services" || true
              else
                printf '> Rapport non disponible pour %s\n' "$arch"
              fi
              printf '\n'
            done
            printf '---\n\n'
            printf '*Rapports detailles disponibles en artifacts du workflow.*\n'
          } > TEST-REPORT.md
          cat TEST-REPORT.md

      - name: Commit TEST-REPORT.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TEST-REPORT.md
          if git diff --cached --quiet; then
            echo "Aucun changement"
            exit 0
          fi
          git commit -m "ci: TEST-REPORT #${{ github.run_number }} (amd64 + arm64)"
          for i in 1 2 3; do
            git push && break || git pull --rebase origin main
          done
