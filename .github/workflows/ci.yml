name: CI – TinAI

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Dockerfile.webui"
      - "docker-compose.yml"
      - ".env.example"
      - "supervisord.conf"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ================================================================
  # JOB 1 – Audit sécurité
  # ================================================================
  security-audit:
    name: 🔒 Audit sécurité
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck -q
          shellcheck --severity=error --exclude=SC2034,SC2154,SC1091 \
            scripts/start-llama.sh \
            scripts/start-openfang.sh \
            scripts/healthcheck.sh
          echo "✅ ShellCheck OK"

      - name: Audit secrets hardcodés
        run: |
          FAIL=false
          FILES="Dockerfile Dockerfile.webui docker-compose.yml .env.example supervisord.conf"
          for p in 'AWS_SECRET' 'GITHUB_TOKEN\s*='; do
            if grep -riE "$p" $FILES 2>/dev/null; then
              echo "FAIL – pattern suspect : $p"
              FAIL=true
            fi
          done
          for p in 'password\s*=\s*"[^$]' 'SECRET_KEY\s*=\s*"[^$]'; do
            if grep -riE "$p" $FILES 2>/dev/null; then
              echo "FAIL – valeur hardcodée : $p"
              FAIL=true
            fi
          done
          [ "$FAIL" = "true" ] && exit 1
          echo "✅ Aucun secret hardcodé"

      - name: Vérif .env absent du repo
        run: |
          git ls-files --error-unmatch .env 2>/dev/null \
            && echo "DANGER – .env est tracké par git" && exit 1 \
            || echo "✅ .env absent du repo"

      - name: Vérif .gitignore
        run: |
          MISSING=false
          for pattern in ".env" "models/" "data/" "*.gguf"; do
            grep -qF "$pattern" .gitignore || { echo "⚠️ Manquant dans .gitignore : $pattern"; MISSING=true; }
          done
          [ "$MISSING" = "true" ] && exit 1 || echo "✅ .gitignore OK"

      - name: Vérif ports via variables
        run: |
          if grep -E '^\s+-\s+"[0-9]+:[0-9]+"' docker-compose.yml; then
            echo "FAIL – port hardcodé détecté"
            exit 1
          fi
          echo "✅ Ports via variables OK"

      - name: Vérif Dockerfiles multi-stage
        run: |
          STAGES=$(grep -c "^FROM" Dockerfile || true)
          echo "Stages Dockerfile : $STAGES"
          [ "$STAGES" -ge 2 ] && echo "✅ Dockerfile multi-stage OK" || echo "⚠️ Dockerfile mono-stage"
          [ -f Dockerfile.webui ] && echo "✅ Dockerfile.webui présent" || { echo "FAIL – Dockerfile.webui manquant"; exit 1; }

      - name: Vérif LICENSE présent
        run: |
          [ -f LICENSE ] && echo "✅ LICENSE présent" || { echo "FAIL – LICENSE manquant"; exit 1; }

      - name: Vérif CONTRIBUTING présent
        run: |
          [ -f CONTRIBUTING.md ] && echo "✅ CONTRIBUTING.md présent" || echo "⚠️ CONTRIBUTING.md manquant"

  # ================================================================
  # JOB 2 – Build & Test (matrice amd64 / arm64)
  # ================================================================
  build-test:
    name: "🧪 Build & Test – ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    needs: security-audit
    timeout-minutes: 90
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers – tinai
        uses: actions/cache@v4
        with:
          path: /tmp/buildx-cache-tinai
          key: buildx-tinai-${{ matrix.arch }}-${{ hashFiles('Dockerfile', 'supervisord.conf', 'scripts/**') }}
          restore-keys: buildx-tinai-${{ matrix.arch }}-

      - name: Cache Docker layers – webui
        uses: actions/cache@v4
        with:
          path: /tmp/buildx-cache-webui
          key: buildx-webui-${{ matrix.arch }}-${{ hashFiles('Dockerfile.webui') }}
          restore-keys: buildx-webui-${{ matrix.arch }}-

      - name: Setup .env CI
        run: |
          cp .env.example .env
          echo "LLAMA_HF_FILE=qwen3-1.7b-q4_k_m.gguf" >> .env
          echo "LLAMA_THREADS=2"                        >> .env
          echo "LLAMA_CTX_SIZE=2048"                   >> .env
          echo "MEM_LIMIT=4g"                          >> .env
          echo "WEBUI_MEM_LIMIT=2g"                    >> .env
          echo "TINAI_IMAGE=tinai:v4-${{ matrix.arch }}"      >> .env
          echo "WEBUI_IMAGE=tinai-webui:v4-${{ matrix.arch }}" >> .env
          echo "TINAI_API_KEY=$(openssl rand -hex 16)"  >> .env
          echo "WEBUI_SECRET_KEY=$(openssl rand -hex 16)" >> .env

      - name: Lint docker-compose
        run: |
          docker compose config > /dev/null
          echo "✅ Syntaxe docker-compose valide"

      - name: Build image tinai:v4-${{ matrix.arch }}
        run: |
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --cache-from "type=local,src=/tmp/buildx-cache-tinai" \
            --cache-to   "type=local,dest=/tmp/buildx-cache-tinai-new,mode=max" \
            --load \
            -t "tinai:v4-${{ matrix.arch }}" \
            -f Dockerfile \
            .
          rm -rf /tmp/buildx-cache-tinai
          mv /tmp/buildx-cache-tinai-new /tmp/buildx-cache-tinai
          echo "✅ Build tinai ${{ matrix.arch }} OK"

      - name: Build image tinai-webui:v4-${{ matrix.arch }}
        run: |
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --cache-from "type=local,src=/tmp/buildx-cache-webui" \
            --cache-to   "type=local,dest=/tmp/buildx-cache-webui-new,mode=max" \
            --load \
            -t "tinai-webui:v4-${{ matrix.arch }}" \
            -f Dockerfile.webui \
            .
          rm -rf /tmp/buildx-cache-webui
          mv /tmp/buildx-cache-webui-new /tmp/buildx-cache-webui
          echo "✅ Build webui ${{ matrix.arch }} OK"

      - name: Taille des images
        run: |
          docker images "tinai:v4-${{ matrix.arch }}"      --format "tinai      : {{.Size}}"
          docker images "tinai-webui:v4-${{ matrix.arch }}" --format "tinai-webui: {{.Size}}"

      - name: Vérification binaires dans l'image tinai
        run: |
          docker run --rm --entrypoint="" "tinai:v4-${{ matrix.arch }}" \
            sh -c "ls -lh /usr/local/bin/llama-server /usr/local/bin/openfang && echo '✅ Binaires présents'"

      - name: Préparation volumes
        run: mkdir -p models data/webui data/openfang

      - name: Démarrage du backend (tinai seul)
        run: |
          # On démarre uniquement tinai d'abord — webui dépend de son healthcheck
          docker compose up -d tinai
          docker compose ps

      - name: Attente tinai healthy
        run: |
          # healthcheck.sh teste openfang (startsecs=15 → RUNNING à ~16s).
          # start_period=25s → Docker évalue le healthcheck à partir de t+25s.
          # Deadline CI=90s → largement suffisant.
          DEADLINE=$(( $(date +%s) + 90 ))
          echo "Attente conteneur tinai healthy..."
          while true; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' tinai 2>/dev/null || echo "unknown")
            echo "  → $STATUS"
            [ "$STATUS" = "healthy" ] && echo "✅ tinai healthy" && break
            [ "$(date +%s)" -ge "$DEADLINE" ] && echo "⏰ Timeout — statut final : $STATUS" && exit 1
            sleep 5
          done

      - name: Démarrage webui
        run: |
          docker compose up -d webui
          docker compose ps

      - name: Attente Open WebUI
        run: |
          # Open WebUI démarre indépendamment de llama-server dans son propre conteneur.
          # Pas de boucle d'attente interne → port :8080 disponible en ~20-40s.
          DEADLINE=$(( $(date +%s) + 120 ))
          echo "Attente Open WebUI :3000..."
          while ! curl -sSf --max-time 5 "http://127.0.0.1:3000/" > /dev/null 2>&1; do
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "⏰ Timeout Open WebUI"
              break
            fi
            sleep 5
          done
          curl -sSf --max-time 5 "http://127.0.0.1:3000/" > /dev/null 2>&1 \
            && echo "✅ Open WebUI :3000 OK" \
            || echo "⚠️ Open WebUI non disponible"

      - name: Tests fonctionnels
        id: tests
        run: |
          FAILED=false
          ARCH="${{ matrix.arch }}"
          API_KEY=$(grep TINAI_API_KEY .env | cut -d= -f2)

          check_url() {
            local name="$1" url="$2" required="$3"
            if curl -sSf --max-time 10 "$url" > /dev/null 2>&1; then
              echo "✅ $name"
            else
              echo "❌ $name"
              [ "$required" = "true" ] && FAILED=true
            fi
          }

          # Open WebUI est le test critique (required=true)
          check_url "Open WebUI :3000"  "http://127.0.0.1:3000/" "true"
          check_url "OpenFang :4200"    "http://127.0.0.1:4200/" "false"

          # llama-server (sans modèle en CI = attendu KO)
          if curl -sSf --max-time 5 \
              -H "Authorization: Bearer ${API_KEY}" \
              "http://127.0.0.1:8081/health" > /dev/null 2>&1; then
            echo "✅ llama-server API répond"
          else
            echo "⏳ llama-server – modèle absent en CI (attendu)"
          fi

          # Test supervisorctl sur le conteneur backend
          SUPERVISOR=$(docker compose exec -T tinai supervisorctl status 2>&1 || echo "N/A")
          echo "--- supervisorctl (tinai) ---"
          echo "$SUPERVISOR"

          # Génération du rapport
          CONTAINERS=$(docker compose ps 2>&1)
          IMG_SIZE_TINAI=$(docker images "tinai:v4-${{ matrix.arch }}" --format "{{.Size}}")
          IMG_SIZE_WEBUI=$(docker images "tinai-webui:v4-${{ matrix.arch }}" --format "{{.Size}}")
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          LOG_LLAMA=$(docker compose exec -T tinai tail -n 20 /var/log/tinai/llama.log 2>/dev/null || echo "N/A")
          LOG_FANG=$(docker compose exec -T tinai  tail -n 10 /var/log/tinai/openfang.log 2>/dev/null || echo "N/A")
          LOG_WEBUI=$(docker compose logs --tail=10 webui 2>&1 || echo "N/A")

          REPORT="TEST-REPORT-${ARCH}.md"
          {
            printf '# TinAI – Test Report (%s)\n\n' "$ARCH"
            printf '**Date    :** %s\n' "$BUILD_DATE"
            printf '**Run     :** [#%s](%s/%s/actions/runs/%s)\n' \
              "${{ github.run_number }}" \
              "${{ github.server_url }}" \
              "${{ github.repository }}" \
              "${{ github.run_id }}"
            printf '**Commit  :** `%s`\n' "${{ github.sha }}"
            printf '**Branch  :** `%s`\n' "${{ github.ref_name }}"
            printf '**Arch    :** `%s` (`%s`)\n' "$ARCH" "${{ matrix.platform }}"
            printf '**tinai   :** `tinai:v4-%s` — %s\n' "$ARCH" "$IMG_SIZE_TINAI"
            printf '**webui   :** `tinai-webui:v4-%s` — %s\n\n' "$ARCH" "$IMG_SIZE_WEBUI"
            printf -- '---\n\n## État des conteneurs\n\n```\n%s\n```\n\n' "$CONTAINERS"
            printf '## Services supervisord (tinai)\n\n```\n%s\n```\n\n' "$SUPERVISOR"
            printf '## Logs llama-server\n\n```\n%s\n```\n\n' "$LOG_LLAMA"
            printf '## Logs OpenFang\n\n```\n%s\n```\n\n' "$LOG_FANG"
            printf '## Logs Open WebUI\n\n```\n%s\n```\n\n' "$LOG_WEBUI"
            printf -- '---\n\n## Notes\n'
            printf -- '- llama-server : modèle non téléchargé en CI (normal)\n'
            printf -- '- Open WebUI   : conteneur dédié, démarre sans attendre llama\n'
            printf -- '- OpenFang     : daemon Rust démarré\n'
          } > "$REPORT"
          cat "$REPORT"

          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"

      - name: Debug logs si échec
        if: failure()
        run: |
          docker compose logs --tail=60 || true
          docker compose exec -T tinai supervisorctl status || true

      - name: Upload TEST-REPORT-${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TEST-REPORT-${{ matrix.arch }}
          path: TEST-REPORT-${{ matrix.arch }}.md

      - name: Teardown
        if: always()
        run: |
          docker compose down --remove-orphans -v 2>/dev/null || true
          docker system prune -f

      - name: Échec si tests critiques KO
        if: steps.tests.outputs.failed == 'true'
        run: |
          echo "❌ Tests critiques échoués sur ${{ matrix.arch }}"
          exit 1

  # ================================================================
  # JOB 3 – Rapport consolidé + commit TEST-REPORT.md
  # ================================================================
  report:
    name: 📋 Rapport consolidé
    runs-on: ubuntu-latest
    needs: build-test
    if: "always() && github.event_name != 'pull_request'"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download rapports
        uses: actions/download-artifact@v4
        with:
          pattern: TEST-REPORT-*
          merge-multiple: true
          path: reports/

      - name: Génération TEST-REPORT.md consolidé
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            printf '# TinAI – Test Report\n\n'
            printf '**Date   :** %s\n' "$BUILD_DATE"
            printf '**Run    :** [#%s](%s/%s/actions/runs/%s)\n' \
              "${{ github.run_number }}" \
              "${{ github.server_url }}" \
              "${{ github.repository }}" \
              "${{ github.run_id }}"
            printf '**Commit :** `%s`\n' "${{ github.sha }}"
            printf '**Branch :** `%s`\n\n' "${{ github.ref_name }}"
            printf -- '---\n\n'
            for arch in amd64 arm64; do
              if [ -f "reports/TEST-REPORT-${arch}.md" ]; then
                # Inclure le rapport complet, en sautant seulement la ligne de titre h1
                tail -n +3 "reports/TEST-REPORT-${arch}.md"
              else
                printf '## %s\n\n> ⚠️ Rapport non disponible\n\n' "$arch"
              fi
            done
            printf -- '---\n\n'
            printf '*Rapports détaillés disponibles en artifacts du workflow.*\n'
          } > TEST-REPORT.md
          cat TEST-REPORT.md

      - name: Commit TEST-REPORT.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TEST-REPORT.md
          git diff --cached --quiet && echo "Aucun changement" && exit 0
          git commit -m "ci: TEST-REPORT #${{ github.run_number }} (amd64 + arm64)"
          for i in 1 2 3; do
            git push && break || git pull --rebase --strategy-option=theirs origin main
          done
