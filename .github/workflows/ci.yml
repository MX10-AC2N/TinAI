name: CI – TinAI

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - ".env.example"
      - "supervisord.conf"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ================================================================
  # JOB 1 – Audit sécurité
  # ================================================================
  security-audit:
    name: 🔒 Audit sécurité
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck -q
          shellcheck --severity=error --exclude=SC2034,SC2154,SC1091 \
            scripts/start-llama.sh \
            scripts/start-webui.sh \
            scripts/start-openfang.sh \
            scripts/healthcheck.sh
          echo "✅ ShellCheck OK"

      - name: Audit secrets hardcodés
        run: |
          FAIL=false
          FILES="Dockerfile docker-compose.yml .env.example supervisord.conf"
          # Patterns interdits absolus
          for p in 'AWS_SECRET' 'GITHUB_TOKEN\s*='; do
            if grep -riE "$p" $FILES 2>/dev/null; then
              echo "FAIL – pattern suspect : $p"
              FAIL=true
            fi
          done
          # Valeurs hardcodées (pas via variable)
          for p in 'password\s*=\s*"[^$]' 'SECRET_KEY\s*=\s*"[^$]'; do
            if grep -riE "$p" $FILES 2>/dev/null; then
              echo "FAIL – valeur hardcodée : $p"
              FAIL=true
            fi
          done
          [ "$FAIL" = "true" ] && exit 1
          echo "✅ Aucun secret hardcodé"

      - name: Vérif .env absent du repo
        run: |
          git ls-files --error-unmatch .env 2>/dev/null \
            && echo "DANGER – .env est tracké par git" && exit 1 \
            || echo "✅ .env absent du repo"

      - name: Vérif .gitignore
        run: |
          MISSING=false
          for pattern in ".env" "models/" "data/" "*.gguf"; do
            grep -qF "$pattern" .gitignore || { echo "⚠️ Manquant dans .gitignore : $pattern"; MISSING=true; }
          done
          [ "$MISSING" = "true" ] && exit 1 || echo "✅ .gitignore OK"

      - name: Vérif ports via variables
        run: |
          if grep -E '^\s+-\s+"[0-9]+:[0-9]+"' docker-compose.yml; then
            echo "FAIL – port hardcodé détecté"
            exit 1
          fi
          echo "✅ Ports via variables OK"

      - name: Vérif Dockerfile multi-stage
        run: |
          STAGES=$(grep -c "^FROM" Dockerfile || true)
          echo "Stages Docker trouvés : $STAGES"
          [ "$STAGES" -ge 2 ] && echo "✅ Multi-stage OK" || echo "⚠️ Build mono-stage"

      - name: Vérif LICENSE présent
        run: |
          [ -f LICENSE ] && echo "✅ LICENSE présent" || { echo "FAIL – LICENSE manquant"; exit 1; }

      - name: Vérif CONTRIBUTING présent
        run: |
          [ -f CONTRIBUTING.md ] && echo "✅ CONTRIBUTING.md présent" || echo "⚠️ CONTRIBUTING.md manquant"

  # ================================================================
  # JOB 2 – Build & Test (matrice amd64 / arm64)
  # ================================================================
  build-test:
    name: "🧪 Build & Test – ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    needs: security-audit
    timeout-minutes: 90
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/buildx-cache
          key: buildx-${{ matrix.arch }}-${{ hashFiles('Dockerfile', 'supervisord.conf', 'scripts/**') }}
          restore-keys: buildx-${{ matrix.arch }}-

      - name: Setup .env CI
        run: |
          cp .env.example .env
          # Config légère pour CI (pas de téléchargement modèle)
          echo "LLAMA_HF_FILE=qwen3-1.7b-q4_k_m.gguf" >> .env
          echo "LLAMA_THREADS=2"                        >> .env
          echo "LLAMA_CTX_SIZE=2048"                   >> .env
          echo "MEM_LIMIT=5g"                          >> .env
          echo "TINAI_IMAGE=tinai:v3-${{ matrix.arch }}" >> .env
          # Clés sécurisées en CI
          echo "TINAI_API_KEY=$(openssl rand -hex 16)"  >> .env
          echo "WEBUI_SECRET_KEY=$(openssl rand -hex 16)" >> .env

      - name: Lint docker-compose
        run: |
          docker compose config > /dev/null
          echo "✅ Syntaxe docker-compose valide"

      - name: Build image tinai:v3-${{ matrix.arch }}
        run: |
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --cache-from "type=local,src=/tmp/buildx-cache" \
            --cache-to   "type=local,dest=/tmp/buildx-cache-new,mode=max" \
            --load \
            -t "tinai:v3-${{ matrix.arch }}" \
            .
          rm -rf /tmp/buildx-cache
          mv /tmp/buildx-cache-new /tmp/buildx-cache
          echo "✅ Build ${{ matrix.arch }} OK"

      - name: Taille de l'image
        run: |
          docker images "tinai:v3-${{ matrix.arch }}" --format "Taille : {{.Size}}"

      - name: Vérification binaires dans l'image
        run: |
          # Vérifie que llama-server et openfang sont bien présents
          docker run --rm --entrypoint="" "tinai:v3-${{ matrix.arch }}" \
            sh -c "ls -lh /usr/local/bin/llama-server /usr/local/bin/openfang && echo '✅ Binaires présents'"

      - name: Préparation volumes
        run: mkdir -p models data/webui data/openfang

      - name: Démarrage du conteneur
        run: |
          docker compose up -d
          docker compose ps

      - name: Attente des services
        run: |
          wait_for() {
            local name="$1" url="$2" max="${3:-90}" i=0
            echo "Attente $name ..."
            while ! curl -sSf --max-time 5 "$url" > /dev/null 2>&1; do
              sleep 5; i=$((i + 5))
              [ "$i" -ge "$max" ] && { echo "⏰ Timeout ${max}s pour $name"; return 1; }
            done
            echo "✅ $name OK en ${i}s"
          }
          wait_for "Open WebUI 3000"   "http://127.0.0.1:3000/"       90 || true
          wait_for "OpenFang 4200"     "http://127.0.0.1:4200/"      120 || true
          wait_for "llama-server 8081" "http://127.0.0.1:8081/health" 30 || true

      - name: Tests fonctionnels
        id: tests
        run: |
          FAILED=false
          ARCH="${{ matrix.arch }}"
          API_KEY=$(grep TINAI_API_KEY .env | cut -d= -f2)

          check_url() {
            local name="$1" url="$2" required="$3"
            if curl -sSf --max-time 10 "$url" > /dev/null 2>&1; then
              echo "✅ $name"
            else
              echo "❌ $name"
              [ "$required" = "true" ] && FAILED=true
            fi
          }

          check_url "Open WebUI :3000"  "http://127.0.0.1:3000/" "true"
          check_url "OpenFang :4200"    "http://127.0.0.1:4200/" "false"

          # llama-server (sans modèle en CI = attendu KO)
          if curl -sSf --max-time 5 \
              -H "Authorization: Bearer ${API_KEY}" \
              "http://127.0.0.1:8081/health" > /dev/null 2>&1; then
            echo "✅ llama-server API répond"
          else
            echo "⏳ llama-server – modèle absent en CI (attendu)"
          fi

          # Test supervisorctl
          SUPERVISOR=$(docker compose exec -T tinai supervisorctl status 2>&1 || echo "N/A")
          echo "--- supervisorctl ---"
          echo "$SUPERVISOR"

          # Test réponse healthcheck
          HEALTH=$(docker compose exec -T tinai /usr/local/bin/healthcheck.sh 2>&1; echo "exit:$?")
          echo "--- healthcheck ---"
          echo "$HEALTH"

          # Génération du rapport
          CONTAINERS=$(docker compose ps 2>&1)
          IMG_SIZE=$(docker images "tinai:v3-${{ matrix.arch }}" --format "{{.Size}}")
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          LOG_LLAMA=$(docker compose exec -T tinai tail -n 20 /var/log/tinai/llama.log 2>/dev/null || echo "N/A")
          LOG_WEBUI=$(docker compose exec -T tinai tail -n 10 /var/log/tinai/webui.log 2>/dev/null || echo "N/A")
          LOG_FANG=$(docker compose exec -T tinai tail -n 10 /var/log/tinai/openfang.log 2>/dev/null || echo "N/A")

          REPORT="TEST-REPORT-${ARCH}.md"
          {
            printf '# TinAI – Test Report (%s)\n\n' "$ARCH"
            printf '**Date    :** %s\n' "$BUILD_DATE"
            printf '**Run     :** [#%s](%s/%s/actions/runs/%s)\n' \
              "${{ github.run_number }}" \
              "${{ github.server_url }}" \
              "${{ github.repository }}" \
              "${{ github.run_id }}"
            printf '**Commit  :** `%s`\n' "${{ github.sha }}"
            printf '**Branch  :** `%s`\n' "${{ github.ref_name }}"
            printf '**Arch    :** `%s` (`%s`)\n' "$ARCH" "${{ matrix.platform }}"
            printf '**Image   :** `tinai:v3-%s` — %s\n\n' "$ARCH" "$IMG_SIZE"
            printf -- '---\n\n## État du conteneur\n\n```\n%s\n```\n\n' "$CONTAINERS"
            printf '## Services supervisord\n\n```\n%s\n```\n\n' "$SUPERVISOR"
            printf '## Logs llama-server\n\n```\n%s\n```\n\n' "$LOG_LLAMA"
            printf '## Logs Open WebUI\n\n```\n%s\n```\n\n' "$LOG_WEBUI"
            printf '## Logs OpenFang\n\n```\n%s\n```\n\n' "$LOG_FANG"
            printf -- '---\n\n## Notes\n'
            printf '- llama-server : modèle non téléchargé en CI (normal)\n'
            printf '- Open WebUI   : interface disponible sans modèle\n'
            printf '- OpenFang     : daemon Rust démarré\n'
          } > "$REPORT"
          cat "$REPORT"

          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"

      - name: Debug logs si échec
        if: failure()
        run: |
          docker compose logs --tail=60 || true
          docker compose exec -T tinai supervisorctl status || true

      - name: Upload TEST-REPORT-${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TEST-REPORT-${{ matrix.arch }}
          path: TEST-REPORT-${{ matrix.arch }}.md

      - name: Teardown
        if: always()
        run: |
          docker compose down --remove-orphans -v 2>/dev/null || true
          docker system prune -f

      - name: Échec si tests critiques KO
        if: steps.tests.outputs.failed == 'true'
        run: |
          echo "❌ Tests critiques échoués sur ${{ matrix.arch }}"
          exit 1

  # ================================================================
  # JOB 3 – Rapport consolidé + commit TEST-REPORT.md
  # ================================================================
  report:
    name: 📋 Rapport consolidé
    runs-on: ubuntu-latest
    needs: build-test
    if: "always() && github.event_name != 'pull_request'"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download rapports
        uses: actions/download-artifact@v4
        with:
          pattern: TEST-REPORT-*
          merge-multiple: true
          path: reports/

      - name: Génération TEST-REPORT.md consolidé
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            printf '# TinAI – Test Report\n\n'
            printf '**Date   :** %s\n' "$BUILD_DATE"
            printf '**Run    :** [#%s](%s/%s/actions/runs/%s)\n' \
              "${{ github.run_number }}" \
              "${{ github.server_url }}" \
              "${{ github.repository }}" \
              "${{ github.run_id }}"
            printf '**Commit :** `%s`\n' "${{ github.sha }}"
            printf '**Branch :** `%s`\n\n' "${{ github.ref_name }}"
            printf -- '---\n\n'
            for arch in amd64 arm64; do
              printf '## %s\n\n' "$arch"
              if [ -f "reports/TEST-REPORT-${arch}.md" ]; then
                awk '/^## État/,/^## Services/' "reports/TEST-REPORT-${arch}.md" \
                  | grep -v "^## Services" || true
              else
                printf '> Rapport non disponible pour %s\n' "$arch"
              fi
              printf '\n'
            done
            printf -- '---\n\n'
            printf '*Rapports détaillés disponibles en artifacts du workflow.*\n'
          } > TEST-REPORT.md
          cat TEST-REPORT.md

      - name: Commit TEST-REPORT.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TEST-REPORT.md
          git diff --cached --quiet && echo "Aucun changement" && exit 0
          git commit -m "ci: TEST-REPORT #${{ github.run_number }} (amd64 + arm64)"
          for i in 1 2 3; do
            git push && break || git pull --rebase origin main
          done
