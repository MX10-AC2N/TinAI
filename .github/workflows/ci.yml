name: CI – TinAI

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - ".env.example"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ================================================================
  # JOB 1 – Audit sécurité
  # ================================================================
  security-audit:
    name: 🔒 Audit sécurité
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck -q
          shellcheck --severity=error --exclude=SC2034,SC2154,SC1091 \
            scripts/start-openfang.sh \
            scripts/healthcheck.sh
          echo "✅ ShellCheck OK"

      - name: Audit secrets hardcodés
        run: |
          FAIL=false
          FILES="Dockerfile docker-compose.yml .env.example"
          for p in 'AWS_SECRET' 'GITHUB_TOKEN\s*='; do
            if grep -riE "$p" $FILES 2>/dev/null; then
              echo "FAIL – pattern suspect : $p"; FAIL=true
            fi
          done
          [ "$FAIL" = "true" ] && exit 1
          echo "✅ Aucun secret hardcodé"

      - name: Vérif .env absent du repo
        run: |
          git ls-files --error-unmatch .env 2>/dev/null \
            && echo "DANGER – .env est tracké par git" && exit 1 \
            || echo "✅ .env absent du repo"

      - name: Vérif .gitignore
        run: |
          MISSING=false
          for pattern in ".env" "models/" "data/" "*.gguf"; do
            grep -qF "$pattern" .gitignore \
              || { echo "⚠️ Manquant dans .gitignore : $pattern"; MISSING=true; }
          done
          [ "$MISSING" = "true" ] && exit 1 || echo "✅ .gitignore OK"

      - name: Vérif ports via variables
        run: |
          if grep -E '^\s+-\s+"[0-9]+:[0-9]+"' docker-compose.yml; then
            echo "FAIL – port hardcodé détecté"; exit 1
          fi
          echo "✅ Ports via variables OK"

      - name: Vérif Dockerfile mono-stage (openfang seulement)
        run: |
          STAGES=$(grep -c "^FROM" Dockerfile || true)
          echo "Stages : $STAGES"
          # v5 : 2 stages (openfang-builder + runtime) — llama.cpp = image externe
          [ "$STAGES" -ge 2 ] && echo "✅ Dockerfile multi-stage OK" \
            || echo "⚠️ Dockerfile mono-stage"
          echo "✅ llama.cpp = ghcr.io/ggml-org/llama.cpp:server (image officielle)"

      - name: Vérif LICENSE présent
        run: |
          [ -f LICENSE ] && echo "✅ LICENSE présent" \
            || { echo "FAIL – LICENSE manquant"; exit 1; }

      - name: Vérif CONTRIBUTING présent
        run: |
          [ -f CONTRIBUTING.md ] && echo "✅ CONTRIBUTING.md présent" \
            || echo "⚠️ CONTRIBUTING.md manquant"

  # ================================================================
  # JOB 2 – Build & Test (matrice amd64 / arm64)
  # ================================================================
  build-test:
    name: "🧪 Build & Test – ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    needs: security-audit
    timeout-minutes: 60
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers – tinai
        uses: actions/cache@v4
        with:
          path: /tmp/buildx-cache-tinai
          key: buildx-tinai-${{ matrix.arch }}-${{ hashFiles('Dockerfile', 'scripts/**') }}
          restore-keys: buildx-tinai-${{ matrix.arch }}-

      - name: Setup .env CI
        run: |
          cp .env.example .env
          echo "LLAMA_THREADS=2"                                         >> .env
          echo "LLAMA_CTX_SIZE=512"                                      >> .env
          echo "MEM_LIMIT=4g"                                            >> .env
          echo "WEBUI_MEM_LIMIT=2g"                                      >> .env
          echo "TINAI_IMAGE=tinai:v5-${{ matrix.arch }}"                 >> .env
          echo "LLAMA_IMAGE=ghcr.io/ggml-org/llama.cpp:server"          >> .env
          echo "WEBUI_IMAGE=ghcr.io/open-webui/open-webui:main-slim"    >> .env
          echo "TINAI_API_KEY=$(openssl rand -hex 16)"                   >> .env
          echo "WEBUI_SECRET_KEY=$(openssl rand -hex 16)"                >> .env

      - name: Lint docker-compose
        run: |
          docker compose config > /dev/null
          echo "✅ Syntaxe docker-compose valide"

      - name: Build image tinai:v5-${{ matrix.arch }}
        run: |
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --cache-from "type=local,src=/tmp/buildx-cache-tinai" \
            --cache-to   "type=local,dest=/tmp/buildx-cache-tinai-new,mode=max" \
            --load \
            -t "tinai:v5-${{ matrix.arch }}" \
            -f Dockerfile \
            .
          rm -rf /tmp/buildx-cache-tinai
          mv /tmp/buildx-cache-tinai-new /tmp/buildx-cache-tinai
          echo "✅ Build tinai ${{ matrix.arch }} OK"

      - name: Pull image llama.cpp officielle
        run: |
          docker pull ghcr.io/ggml-org/llama.cpp:server
          echo "✅ ghcr.io/ggml-org/llama.cpp:server prête"

      - name: Taille des images
        run: |
          docker images "tinai:v5-${{ matrix.arch }}"      --format "tinai  : {{.Size}}"
          docker images "ghcr.io/ggml-org/llama.cpp:server" --format "llama  : {{.Size}}"

      - name: Vérification binaire openfang dans l'image
        run: |
          docker run --rm --entrypoint="" "tinai:v5-${{ matrix.arch }}" \
            sh -c "ls -lh /usr/local/bin/openfang && echo '✅ openfang présent'"

      - name: Préparation volumes
        run: mkdir -p models data/webui data/openfang

      - name: Démarrage llama (sans modèle — CI)
        run: |
          # En CI, pas de modèle GGUF → llama-server démarre mais reste unhealthy.
          # C'est attendu. On démarre avec --ignore-health pour ne pas bloquer.
          docker compose up -d llama
          docker compose ps

      - name: Démarrage tinai (OpenFang)
        run: |
          # tinai démarre dès que llama est "started" (pas besoin de healthy)
          docker compose up -d tinai
          docker compose ps

      - name: Attente tinai healthy
        run: |
          DEADLINE=$(( $(date +%s) + 90 ))
          echo "Attente conteneur tinai healthy..."
          while true; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' tinai 2>/dev/null || echo "unknown")
            echo "  → $STATUS"
            [ "$STATUS" = "healthy" ] && echo "✅ tinai healthy" && break
            [ "$(date +%s)" -ge "$DEADLINE" ] && echo "⏰ Timeout — statut : $STATUS" && exit 1
            sleep 5
          done

      - name: Tests fonctionnels
        id: tests
        run: |
          FAILED=false
          ARCH="${{ matrix.arch }}"

          check_url() {
            local name="$1" url="$2" required="$3"
            if curl -sSf --max-time 10 "$url" > /dev/null 2>&1; then
              echo "✅ $name"
            else
              echo "❌ $name"
              [ "$required" = "true" ] && FAILED=true
            fi
          }

          check_url "OpenFang :4200"  "http://127.0.0.1:4200/"  "true"
          check_url "OpenFang health" "http://127.0.0.1:4200/api/health" "true"

          # llama-server : sans modèle en CI → attendu KO sur /v1/models
          # mais le port doit répondre (même avec 401/404)
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" --max-time 5 "http://127.0.0.1:8081/" || echo "000")
          echo "llama-server HTTP $HTTP_CODE (sans modèle en CI)"
          [ "$HTTP_CODE" != "000" ] && echo "✅ llama-server port répond" \
            || echo "⏳ llama-server non disponible (modèle absent en CI)"

          # Rapport
          CONTAINERS=$(docker compose ps 2>&1)
          IMG_SIZE_TINAI=$(docker images "tinai:v5-${{ matrix.arch }}" --format "{{.Size}}")
          IMG_SIZE_LLAMA=$(docker images "ghcr.io/ggml-org/llama.cpp:server" --format "{{.Size}}")
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          LOG_FANG=$(docker compose logs --tail=15 tinai 2>&1 || echo "N/A")
          LOG_LLAMA=$(docker compose logs --tail=10 llama 2>&1 || echo "N/A")

          REPORT="TEST-REPORT-${ARCH}.md"
          {
            printf '# TinAI – Test Report (%s)\n\n' "$ARCH"
            printf '**Date    :** %s\n' "$BUILD_DATE"
            printf '**Run     :** [#%s](%s/%s/actions/runs/%s)\n' \
              "${{ github.run_number }}" \
              "${{ github.server_url }}" \
              "${{ github.repository }}" \
              "${{ github.run_id }}"
            printf '**Commit  :** `%s`\n' "${{ github.sha }}"
            printf '**Arch    :** `%s`\n' "$ARCH"
            printf '**tinai   :** `tinai:v5-%s` — %s\n' "$ARCH" "$IMG_SIZE_TINAI"
            printf '**llama   :** `ghcr.io/ggml-org/llama.cpp:server` — %s\n\n' "$IMG_SIZE_LLAMA"
            printf -- '---\n\n## État des conteneurs\n\n```\n%s\n```\n\n' "$CONTAINERS"
            printf '## Logs OpenFang\n\n```\n%s\n```\n\n' "$LOG_FANG"
            printf '## Logs llama-server\n\n```\n%s\n```\n\n' "$LOG_LLAMA"
            printf -- '---\n\n## Notes\n'
            printf -- '- llama-server : modèle non téléchargé en CI (normal)\n'
            printf -- '- tinai v5 : llama.cpp = image officielle ghcr.io/ggml-org/llama.cpp:server\n'
            printf -- '- Open WebUI : optionnel via --profile webui\n'
          } > "$REPORT"
          cat "$REPORT"

          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"

      - name: Debug logs si échec
        if: failure()
        run: docker compose logs --tail=60 || true

      - name: Upload TEST-REPORT-${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TEST-REPORT-${{ matrix.arch }}
          path: TEST-REPORT-${{ matrix.arch }}.md

      - name: Teardown
        if: always()
        run: |
          docker compose down --remove-orphans -v 2>/dev/null || true
          docker system prune -f

      - name: Échec si tests critiques KO
        if: steps.tests.outputs.failed == 'true'
        run: |
          echo "❌ Tests critiques échoués sur ${{ matrix.arch }}"
          exit 1

  # ================================================================
  # JOB 3 – Rapport consolidé
  # ================================================================
  report:
    name: 📋 Rapport consolidé
    runs-on: ubuntu-latest
    needs: build-test
    if: "always() && github.event_name != 'pull_request'"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download rapports
        uses: actions/download-artifact@v4
        with:
          pattern: TEST-REPORT-*
          merge-multiple: true
          path: reports/

      - name: Génération TEST-REPORT.md consolidé
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            printf '# TinAI – Test Report\n\n'
            printf '**Date   :** %s\n' "$BUILD_DATE"
            printf '**Run    :** [#%s](%s/%s/actions/runs/%s)\n' \
              "${{ github.run_number }}" \
              "${{ github.server_url }}" \
              "${{ github.repository }}" \
              "${{ github.run_id }}"
            printf '**Commit :** `%s`\n' "${{ github.sha }}"
            printf '**Branch :** `%s`\n\n' "${{ github.ref_name }}"
            printf -- '---\n\n'
            for arch in amd64 arm64; do
              printf '## %s\n\n' "$arch"
              if [ -f "reports/TEST-REPORT-${arch}.md" ]; then
                awk '/^## État/,/^## Logs OpenFang/' "reports/TEST-REPORT-${arch}.md" \
                  | grep -v "^## Logs OpenFang" || true
              else
                printf '> Rapport non disponible pour %s\n' "$arch"
              fi
              printf '\n'
            done
            printf -- '---\n\n'
            printf '*Rapports détaillés disponibles en artifacts du workflow.*\n'
          } > TEST-REPORT.md
          cat TEST-REPORT.md

      - name: Commit TEST-REPORT.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TEST-REPORT.md
          git diff --cached --quiet && echo "Aucun changement" && exit 0
          git commit -m "ci: TEST-REPORT #${{ github.run_number }} (amd64 + arm64)"
          for i in 1 2 3; do
            git push && break || git pull --rebase -X theirs origin main
          done
