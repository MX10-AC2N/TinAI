[supervisord]
nodaemon=true
logfile=/var/log/tinai/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
pidfile=/var/run/supervisord.pid
user=root

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

# ── llama-server ──────────────────────────────────────────────────
[program:llama]
command=/usr/local/bin/start-llama.sh
autostart=true
autorestart=true
priority=10
startretries=3
startsecs=5
stdout_logfile=/var/log/tinai/llama.log
stdout_logfile_maxbytes=5MB
stderr_logfile=/var/log/tinai/llama.err
stderr_logfile_maxbytes=5MB
environment=
    HOME="/root",
    PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",
    LLAMA_HF_REPO="%(ENV_LLAMA_HF_REPO)s",
    LLAMA_HF_FILE="%(ENV_LLAMA_HF_FILE)s",
    LLAMA_MODEL_PATH="%(ENV_LLAMA_MODEL_PATH)s",
    LLAMA_CTX_SIZE="%(ENV_LLAMA_CTX_SIZE)s",
    LLAMA_THREADS="%(ENV_LLAMA_THREADS)s",
    LLAMA_GPU_LAYERS="%(ENV_LLAMA_GPU_LAYERS)s",
    LLAMA_PORT="%(ENV_LLAMA_PORT)s",
    TINAI_API_KEY="%(ENV_TINAI_API_KEY)s"

# ── OpenFang (binaire Rust natif) ────────────────────────────────
[program:openfang]
command=/usr/local/bin/start-openfang.sh
autostart=true
autorestart=true
priority=20
startretries=3
startsecs=15
stdout_logfile=/var/log/tinai/openfang.log
stdout_logfile_maxbytes=5MB
stderr_logfile=/var/log/tinai/openfang.err
stderr_logfile_maxbytes=5MB
environment=HOME="/root",PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
